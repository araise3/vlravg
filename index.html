// Act metadata from valorant-api.com (keyless, CORS-open, so the browser can call
// it directly regardless of our own API proxy). Maps act UUID → {start, resetAct}
// where resetAct means it's the first act of its episode/season container — i.e.
// the full placement reset (which happens twice a year). Best-effort: stays null
// on failure, and getActInfo() then falls back to HARDCODED_ACT_META.
let _actMeta=null,_seasonDatesPromise=null;
function loadSeasonDates(){
  if(_seasonDatesPromise)return _seasonDatesPromise;
  _seasonDatesPromise=fetch('https://valorant-api.com/v1/seasons')
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(j=>{
      // Acts carry a parentUuid (their episode/season); episodes/seasons don't.
      const acts=(j.data||[]).filter(s=>s.uuid&&s.startTime&&s.parentUuid)
        .map(s=>({uuid:s.uuid.toLowerCase(),parent:s.parentUuid,t:Date.parse(s.startTime)}))
        .filter(s=>!isNaN(s.t));
      // The earliest-starting act under each parent is that season's reset act.
      const firstByParent={};
      acts.forEach(s=>{
        const f=firstByParent[s.parent];
        if(!f||s.t<f.t)firstByParent[s.parent]=s;
      });
      const resetUuids=new Set(Object.values(firstByParent).map(s=>s.uuid));
      const meta={};
      acts.forEach(s=>{meta[s.uuid]={start:s.t,resetAct:resetUuids.has(s.uuid)};});
      _actMeta=meta;
      return meta;
    })
    .catch(()=>{_actMeta=null;return null;});
  return _seasonDatesPromise;
}

// Looks up a match's act start info by whichever source is available, in
// order of trust: live valorant-api data (by UUID) → hardcoded snapshot (also
// by UUID) → null (caller falls back further to the history heuristic).
function getActInfo(m){
  if(!m.seasonId)return null;
  const id=m.seasonId.toLowerCase();
  return (_actMeta&&_actMeta[id])||HARDCODED_ACT_META[id]||null;
}

// Same lookup, but by season UUID directly (used where we have TARGET_SEASON
// rather than a match object on hand).
function getActInfoByUuid(uuid){
  if(!uuid)return null;
  const id=uuid.toLowerCase();
  return (_actMeta&&_actMeta[id])||HARDCODED_ACT_META[id]||null;
}

// Twice a year Valorant does a "total" rank reset — everyone recalibrates through
// five placement games, so ranks (and the avg-lobby-rank figure) run low for about
// a week. That reset lands on the first act of each episode/season container (e.g.
// Episode 9 Act I, or V26 Act IV, which opens the year's second half). We flag
// matches in the first RESET_GRACE_DAYS of such an act (m.postReset=true) so they
// can be greyed out in the history and left out of stats by default (a toggle can
// re-include them). Act start dates + reset status come from getActInfo(), which
// tries live valorant-api data first, then the hardcoded snapshot. A match whose
// act isn't in either source (e.g. a brand-new act launched after this snapshot,
// while valorant-api is also unreachable) simply isn't tagged as post-reset.
const RESET_GRACE_DAYS=7;
function tagPostResetPlacements(matches,days=RESET_GRACE_DAYS){
  const WINDOW=days*86400000;
  matches.forEach(m=>{
    const info=getActInfo(m);
    m.postReset=!!(info&&info.resetAct&&m.startedAtMs!=null&&m.startedAtMs<info.start+WINDOW);
  });
  return matches;
}

/* ── LOAD ─────────────────────────────────────────────────── */
async function loadAll(prefetchSnapshot=null){
  const myGen=++_analysisGen; // supersede any in-flight analysis
  loadSeasonDates(); // fire off act-start dates now; awaited before we filter matches
  __debugResetRate(); // TEMP DEBUG — clear the quota readout for a fresh run
  setProgress(3);
  try{
    // Step 0: resolve PUUID so we can find the player in historical matches
    // regardless of name changes over time
    setStatus('Resolving player…',true);
    try{
      let acctJ;
      if(prefetchSnapshot?.acctJ){
        acctJ=prefetchSnapshot.acctJ;
      }else{
        const acctUrl=`${API_BASE}/account/${encodeURIComponent(PLAYER)}/${TAG}`;
        ({j:acctJ}=await apiGet(acctUrl));
      }
      const acctData=acctJ.data||acctJ;
      PUUID=acctData.puuid||'';
      // Use API-returned name/tag for correct capitalisation
      if(acctData.name) PLAYER=acctData.name;
      if(acctData.tag)  TAG=acctData.tag;
      if(acctData.region){
        REGION=acctData.region.toLowerCase();
      }
    }catch(_){
      // If account lookup fails, fall back to name+tag matching
    }
    if(myGen!==_analysisGen)return;
    // Autocorrect the input's casing now that it's resolved (corrected casing
    // on success, the originally-typed value stays as a fallback on failure).
    {
      const inputEl=document.getElementById('m-nametag');
      if(inputEl)inputEl.value=`${PLAYER}#${TAG}`;
    }

    // Step 1: fetch v3/mmr (or reuse the prefetch) — used for dropdown update, auto-select, and offset calculation
    let targetCount=null;
    let start=0;
    let finalCurrent=null;
    let finalSeasonLabel=null;
    setStatus('Fetching season history…',true);
    try{
      let mmrJ;
      if(prefetchSnapshot?.mmrJ){
        mmrJ=prefetchSnapshot.mmrJ;
      }else{
        const mmrUrl=`${API_BASE}/rank/${REGION}/${PLATFORM}/${encodeURIComponent(PLAYER)}/${TAG}`;
        ({j:mmrJ}=await apiGet(mmrUrl));
      }
      const seasonal=(mmrJ.data||mmrJ).seasonal||[];
      const seasonOrder=getSeasonOrder(seasonal);
      finalCurrent=(mmrJ.data||mmrJ).current||null;

      // Build UUID-keyed stats map for dropdown
      const seasonStats={};
      seasonal.forEach(s=>{
        const id=(s.season?.id||'').toLowerCase();
        if(!id)return;
        seasonStats[id]={peakRank:s.peak_rank?.patched||null,games:s.games||0,short:s.season?.short||null};
      });

      // Repopulate dropdown: only acts the player has played, with peak rank badge
      if(Object.keys(seasonStats).length)updateSeasonDropdown(seasonStats,seasonOrder);

      // Auto-select most recent played act if no season was explicitly chosen
      if(!TARGET_SEASON){
        let picked=false;
        for(let i=seasonOrder.length-1;i>=0;i--){
          const uuid=seasonOrder[i];
          if(seasonStats[uuid.toLowerCase()]?.games>0){
            TARGET_SEASON=uuid;
            const sel=document.getElementById('m-season');
            sel.value=uuid;
            updateSeasonTriggerLabel();
            finalSeasonLabel=sel.selectedOptions[0]?.text||getActLabel(uuid,seasonStats[uuid.toLowerCase()]?.short);
            picked=true;
            break;
          }
        }
        // Genuinely nothing to default to (player has 0 games in every act we
        // know about) — show literal "All" instead of a "Most recent" guess.
        if(!picked)finalSeasonLabel='All';
      }else{
        finalSeasonLabel=getSeasonPreviewLabel();
      }

      // Compute game count + skip offset for the target season
      if(TARGET_SEASON){
        const actEntry=seasonal.find(s=>s.season?.id===TARGET_SEASON);
        if(actEntry?.games){
          targetCount=actEntry.games;
          const targetIdx=seasonOrder.indexOf(TARGET_SEASON);
          const skipGames=seasonal
            .filter(s=>seasonOrder.indexOf(s.season?.id)>targetIdx)
            .reduce((sum,s)=>sum+(s.games||0),0);
          start=Math.max(0,skipGames-20);
          console.log(`[mmr] targetCount=${targetCount} skipGames=${skipGames} startOffset=${start}`);
          setStatus(`Act has ${targetCount} games — jumping to offset ${start}…`,true);
        }
      }
    }catch(_){
      // MMR fetch failed — proceed from offset 0 with no optimisation. We also
      // can't auto-pick an act now, so it's genuinely "All" unless the player
      // explicitly chose a season before hitting Search.
      finalSeasonLabel=TARGET_SEASON?getSeasonPreviewLabel():'All';
    }
    // Reveal rank, season, and region together — nothing pops in separately.
    if(myGen!==_analysisGen)return;
    finalizeHeader(finalCurrent,finalSeasonLabel||getSeasonPreviewLabel());

    // Step 2: paginate match history, stopping when we hit targetCount
    let collected=[];
    // Safety bound: the v4 matchlist response has no total/pagination metadata
    // (only status+data), so an empty page is the sole reliable end signal. Since
    // we no longer treat a short page as the end, guard against a pathological
    // never-empty response with a hard offset ceiling. Competitive history is
    // finite and this is far beyond any real account's game count.
    const MAX_OFFSET=5000;
    let guardPages=0, MAX_PAGES=600; // ~ MAX_OFFSET/min-page-size, belt-and-braces

    while(true){
      if(start>=MAX_OFFSET||++guardPages>MAX_PAGES)break; // safety stop
      // Update status and progress bar together from the same value so they stay in sync
      const pct=targetCount?Math.round(collected.length/targetCount*100):null;
      setStatus(`Fetching matches ${start+1}–${start+BATCH} · ${collected.length}${targetCount?'/'+targetCount:''} found${pct?' ('+pct+'%)':''}…`,true);
      setProgress(targetCount
        ?Math.min(5+collected.length/targetCount*90,95)
        :Math.min(10+start/4,85));

      const url=`${API_BASE}/history/${REGION}/${PLATFORM}/${encodeURIComponent(PLAYER)}/${TAG}?mode=competitive&size=${BATCH}&start=${start}`;
      const{j}=await fetchWithRetry(url);
      if(myGen!==_analysisGen)return; // superseded by a newer act selection
      const data=j.data||[];
      // TRUE end of history: the API returned nothing at this offset.
      if(!data.length)break;

      const onPage=TARGET_SEASON?data.filter(m=>isSeason(m)):data;
      onPage.forEach(m=>collected.push(m));

      // If we're fetching a specific act and have all its games, stop.
      if(TARGET_SEASON&&targetCount&&collected.length>=targetCount)break;
      // Scrolled past the season — a full-ish page with zero matching games
      // means we've paged beyond the target act.
      if(TARGET_SEASON&&collected.length>0&&onPage.length===0)break;

      // Advance by the number of matches the API ACTUALLY returned (not the
      // requested size) — robust even if the API returns fewer than asked.
      start+=data.length;
      // No manual inter-batch delay here: apiGet() paces itself from the live
      // quota headers before every call. See the rate-limit ledger above.
      if(myGen!==_analysisGen)return;
    }

    // Deduplicate by match_id
    const seen=new Set();
    const deduped=collected.filter(m=>{
      const id=m.metadata?.match_id||m.match_id||'';
      if(!id||seen.has(id))return false;
      seen.add(id);return true;
    });
    await loadSeasonDates(); // ensure real act-start dates are in before filtering
    allMatches=tagPostResetPlacements(deduped.map(processMatch));
    if(myGen!==_analysisGen)return; // a newer analysis took over
    setProgress(100);
    setTimeout(()=>setProgress(0),600);
    renderAll();
    __debugFinishRun(); // TEMP DEBUG — freeze the run timer + final req/min
  }catch(e){
    if(myGen!==_analysisGen)return; // superseded run — swallow its error
    setStatus('');
    document.getElementById('error-container').innerHTML=
      `<div class="error-box">Error: ${e.message}<br><br>Check browser console (F12) for details.</div>`;
  }
}

/* ── RENDER ALL ──────────────────────────────────────────── */
// Renders `rows` (an array of built elements) into `containerEl` in pages of
// `pageSize`, with click-through dot indicators in `dotsEl` when there's
// more than one page. Used by the party-size, player-rank, and lobby-rank breakdowns.
// Builds/updates the pagination dots for a list, animating dots in and out
// when the number of pages changes (e.g. toggling K/D modes). If the count is
// unchanged it just updates which dot is active (no re-animation).
// Drives the card's prev/next arrows (in the bottom bar beside the dots) off its
// pagination dots — clicking an arrow just triggers the appropriate dot (reusing
// its animated page change), and the arrows show only when there's more than one page. Wraps around.
function updateCardNav(dotsEl,count){
  const card=dotsEl.closest('.s-card');
  if(!card)return;
  const prev=card.querySelector('.card-nav-prev'),next=card.querySelector('.card-nav-next');
  if(!prev||!next)return;
  const go=(delta)=>{
    const dots=[...dotsEl.querySelectorAll('.pb-dot:not(.dot-removing)')];
    if(dots.length<2)return;
    const cur=Math.max(0,dots.findIndex(d=>d.classList.contains('active')));
    dots[(cur+delta+dots.length)%dots.length]?.click();
  };
  prev.onclick=()=>go(-1);
  next.onclick=()=>go(1);
  const show=count>1;
  prev.classList.toggle('show',show);
  next.classList.toggle('show',show);
}

function syncDots(dotsEl,count,activeIdx,onClick){
  dotsEl.style.display='flex';
  updateCardNav(dotsEl,count);
  const live=[...dotsEl.querySelectorAll('.pb-dot:not(.dot-removing)')];
  if(live.length===count){
    live.forEach((d,i)=>d.classList.toggle('active',i===activeIdx));
    return;
  }
  // Fade/scale out the dots that are going away.
  live.forEach(d=>{
    d.classList.add('dot-removing','dot-hidden');
    setTimeout(()=>d.remove(),260);
  });
  // Add the new set, entering from hidden on the next frame.
  const created=[];
  for(let i=0;i<count;i++){
    const dot=document.createElement('button');
    dot.type='button';
    dot.className='pb-dot dot-hidden'+(i===activeIdx?' active':'');
    dot.setAttribute('aria-label','Page '+(i+1));
    const idx=i;
    dot.addEventListener('click',()=>onClick(idx));
    dotsEl.appendChild(dot);
    created.push(dot);
  }
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    created.forEach(d=>d.classList.remove('dot-hidden'));
  }));
}

function paginateRows(containerEl,dotsEl,rows,pageSize,skipHeightLock,afterRender){
  containerEl.innerHTML='';
  const pageCount=Math.ceil(rows.length/pageSize);
  if(pageCount<=1){
    rows.forEach(r=>containerEl.appendChild(r));
    // Keep the row in layout (dots animate out) rather than display:none, so
    // the bottom of the card doesn't shrink when switching to a single page.
    syncDots(dotsEl,0,0,()=>{});
    if(afterRender)afterRender();
    return;
  }
  let currentIdx=0;
  function renderPage(idx,animate){
    if(!animate){
      containerEl.innerHTML='';
      rows.slice(idx*pageSize,idx*pageSize+pageSize).forEach(r=>containerEl.appendChild(r));
      [...dotsEl.querySelectorAll('.pb-dot:not(.dot-removing)')].forEach((d,i)=>d.classList.toggle('active',i===idx));
      currentIdx=idx;
      if(afterRender)afterRender();
      return;
    }
    if(idx===currentIdx)return;
    const dir=idx>currentIdx?1:-1;
    currentIdx=idx;
    [...dotsEl.querySelectorAll('.pb-dot:not(.dot-removing)')].forEach((d,i)=>d.classList.toggle('active',i===idx));
    containerEl.style.transition='opacity .15s ease,transform .15s ease';
    containerEl.style.opacity='0';
    containerEl.style.transform=`translateX(${dir*-14}px)`;
    setTimeout(()=>{
      containerEl.innerHTML='';
      rows.slice(idx*pageSize,idx*pageSize+pageSize).forEach(r=>containerEl.appendChild(r));
      if(afterRender)afterRender();
      containerEl.style.transition='none';
      containerEl.style.transform=`translateX(${dir*14}px)`;
      void containerEl.offsetWidth; // force reflow so the next transition runs
      containerEl.style.transition='opacity .22s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1)';
      containerEl.style.opacity='1';
      containerEl.style.transform='translateX(0)';
    },150);
  }
  syncDots(dotsEl,pageCount,0,(i)=>renderPage(i,true));
  containerEl.style.minHeight='';
  if(!skipHeightLock)containerEl.style.overflow='hidden';
  renderPage(0,false);
  // Lock the box to the height of its fullest page so switching to a page
  // with fewer rows doesn't shrink the card. Deferred to the next frame
  // because the card/container may still be display:none right now (its
  // visibility gets turned on by the caller right after this returns),
  // which would make offsetHeight read as 0.
  if(!skipHeightLock){
    requestAnimationFrame(()=>{
      containerEl.style.minHeight=containerEl.offsetHeight+'px';
    });
  }
}

// Renders every stat panel. Avg Lobby Rank, Duos, and the K/D-by-rank card use
// statMatches, which excludes post-reset placement games unless the person
// toggles them in (mhIncludeReset) — since rank genuinely resets/recalibrates
// during placements. The Stats panel (K/D, ACS, Games, Win Rate) always counts
// placement games regardless, via statsPanelMatches below, since those raw
// results are real. Kept separate from renderAll so toggles can refresh stats
// without rebuilding the history list.
function renderStats(skipPlaytime){
  statMatches=mhIncludeReset?allMatches:allMatches.filter(m=>!m.postReset);
  // The Stats panel (K/D, ACS, Games, Win Rate) always counts placement-week
  // games, regardless of the reset toggle — unlike avg lobby rank, which
  // genuinely resets and recalibrates during placements, raw kills/deaths/
  // wins/ACS from those games are real results and shouldn't be hidden by
  // default. Mirrors the same reasoning already applied to playtime.
  const statsPanelMatches=allMatches;
  const n=statsPanelMatches.length;
  // Reflect the toggle: show it only when there are placement-week games to skip.
  // This control now lives in the hero card (replacing the old all-parties
  // toggle slot) instead of the match history filter bar.
  const resetCount=allMatches.filter(m=>m.postReset).length;
  const resetToggle=document.getElementById('reset-toggle');
  if(resetToggle){
    resetToggle.hidden=resetCount===0;
    const cb=document.getElementById('reset-toggle-cb');
    if(cb)cb.checked=mhIncludeReset;
    const lbl=document.getElementById('reset-toggle-count');
    if(lbl)lbl.textContent=resetCount;
  }
  // When counted, they're no longer "filtered out", so lift the greying (the
  // PLACEMENTS tag stays so they remain identifiable). No history re-render needed.
  const mc=document.getElementById('matches-container');
  if(mc)mc.classList.toggle('counting-reset',mhIncludeReset);

  // Avg lobby rank (overall + last 20) only counts solo queue games — party
  // rank inflates lobby strength since a stack often queues into weaker
  // lobbies for its rank.
  const soloMatches=statMatches.filter(m=>(m.partySize||1)===1);
  const avgs=soloMatches.map(m=>m.avgRank).filter(Boolean);
  const overall=avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:null;

  // Theme the whole UI from the average lobby rank (not the player's own rank).
  // Fall back to all matches if the player has no solo-queue games.
  const accentAvg=overall!=null?overall:(()=>{
    const a=statMatches.map(m=>m.avgRank).filter(Boolean);
    return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  })();
  if(accentAvg!=null)setAccent(rColor(Math.round(accentAvg)));

  // Sum raw kills and deaths across all games for an accurate overall K/D
  const statGames=statsPanelMatches.filter(m=>m.myStats&&m.myStats.kills!=null&&m.myStats.deaths!=null);
  const totalKills=statGames.reduce((a,m)=>a+m.myStats.kills,0);
  const totalDeaths=statGames.reduce((a,m)=>a+m.myStats.deaths,0);
  const avgKD=statGames.length?(totalDeaths>0?+(totalKills/totalDeaths).toFixed(2):totalKills):null;

  const wins=statsPanelMatches.filter(m=>m.won===true).length;
  const wr=n?Math.round(wins/n*100):0;
  const wrColor=wr>=50?'#22c55e':'#ef4444';
  document.getElementById('sg-games').textContent=n;
  document.getElementById('sg-wr').textContent=wr+'%';
  // Solid-colored pill backgrounds, matching the Clutches card's treatment —
  // white text throughout, colored by value where a good/bad read makes
  // sense (K/D, Win Rate), and a fixed distinctive color otherwise (ACS,
  // Games) purely for visual variety rather than implying a judgment.
  function colorPill(pillId,lblId,bg){
    const pill=document.getElementById(pillId);
    if(!pill)return;
    pill.style.background=bg;
    pill.style.borderColor='transparent';
    const val=pill.querySelector('.tm-pill-val');
    if(val)val.style.color='#fff';
    const lbl=document.getElementById(lblId);
    if(lbl){lbl.style.color='#fff';lbl.style.opacity='.85';}
  }
  colorPill('sg-games-pill','sg-games-lbl','#3b82f6');
  colorPill('sg-wr-pill','sg-wr-lbl',wrColor);

  renderClutchCard(statsPanelMatches);

  const overallRR=overall!=null?tierRR(overall):null;
  const avgRankTier=overallRR?overallRR.tier:null;
  document.getElementById('sg-avg-rank').innerHTML=(avgRankTier!=null?rankIcon(avgRankTier,40)+' ':'')+(overall!=null?`<span>${avgLabel(avgRankTier)}<span class="s-value-suffix"> (${overallRR.rr} RR)</span></span>`:avgLabel(overall));
  // Last 20 games avg rank — its own standout section under the rank value
  // (using the space freed up by removing the rank-breakdown chips).
  const last20=avgs.slice(-20);
  const recent20=last20.length?last20.reduce((a,b)=>a+b,0)/last20.length:null;
  const recent20RR=recent20!=null?tierRR(recent20):null;
  const heroRecent=document.getElementById('hero-recent');
  if(recent20!=null){
    heroRecent.style.display='flex';
    document.getElementById('hero-recent-body').innerHTML=
      `<span class="hero-recent-rank">${avgLabel(recent20RR.tier)}<span class="hero-recent-rr"> (${recent20RR.rr} RR)</span></span>`;
  }else{
    heroRecent.style.display='none';
  }

  document.getElementById('sg-kd').textContent=avgKD!=null?avgKD.toFixed(2):'—';
  colorPill('sg-kd-pill','sg-kd-lbl',(avgKD!=null&&avgKD>=1)?'#22c55e':'#ef4444');

  // Avg ACS — total combat score ÷ total rounds (weighted, matches tracker.gg)
  const acsGames=statsPanelMatches.filter(m=>m.myStats?.acs!=null&&m.myStats?.rounds_played>0);
  const totalAcsScore=acsGames.reduce((a,m)=>a+m.myStats.score,0);
  const totalAcsRounds=acsGames.reduce((a,m)=>a+m.myStats.rounds_played,0);
  const avgAcs=totalAcsRounds>0?Math.round(totalAcsScore/totalAcsRounds):null;
  document.getElementById('sg-acs').textContent=avgAcs!=null?avgAcs:'—';
  colorPill('sg-acs-pill','sg-acs-lbl','#14b8a6');

  renderRankByRankCard();

  // Widest avg-lobby badge label, used to fix the badge column width. Only the
  // distinct labels matter (there are at most ~28 possible rank+RR strings), so
  // measure each unique label once rather than once per match, and reuse a
  // cached canvas context instead of allocating a new <canvas> each render.
  const _badgeCtx=measureCtx();
  _badgeCtx.font='700 13px Geist,system-ui,sans-serif';
  const _seenLabels=new Set();
  let _maxBadgeW=0;
  for(const m of allMatches){
    if(m.avgRank==null)continue;
    const _rr=tierRR(m.avgRank);
    const lbl=`${avgLabelShort(_rr.tier)} (${_rr.rr} RR)`;
    if(_seenLabels.has(lbl))continue;
    _seenLabels.add(lbl);
    _maxBadgeW=Math.max(_maxBadgeW,_badgeCtx.measureText(lbl).width);
  }
  const _badgeW=Math.ceil(_maxBadgeW)+16;
  document.documentElement.style.setProperty('--match-badge-w',_badgeW+'px');

  document.getElementById('summary-grid').style.display='flex';
  // Rank trend always counts placement-week games — a real trend chart benefits
  // from showing the full trajectory including a placement dip, unlike the
  // single "current rank" figure in the hero card which stays toggle-gated to
  // avoid a placement week diluting a one-number snapshot. So this uses
  // allMatches (like renderPlaytime) rather than statMatches, and is likewise
  // unaffected by mhIncludeReset — skip rebuilding it on that toggle too.
  if(!skipPlaytime)renderRankTrend(allMatches.filter(m=>(m.partySize||1)===1));
  // Playtime is always computed from allMatches (see renderPlaytime), so it's
  // completely unaffected by mhIncludeReset — rebuilding/destroying the Chart.js
  // instance here would just be a pointless flash every time this toggle flips.
  if(!skipPlaytime)renderPlaytime();
  document.getElementById('show-history-btn').style.display='block';
  buildTeammates();
}

function renderAll(){
  if(!allMatches.length){setStatus('No matches found for this season.');return;}
  renderStats();

  // Populate rank filter buttons based on what ranks actually appear in the data
  const RANK_GROUP_DEFS=[
    {label:'Iron',  tiers:[3,4,5], color:rColor(3)},
    {label:'Bronze',tiers:[6,7,8], color:rColor(6)},
    {label:'Silver',tiers:[9,10,11],color:rColor(9)},
    {label:'Gold',  tiers:[12,13,14],color:rColor(12)},
    {label:'Platinum',tiers:[15,16,17],color:rColor(15)},
    {label:'Diamond',tiers:[18,19,20],color:rColor(18)},
    {label:'Ascendant',tiers:[21,22,23],color:rColor(21)},
    {label:'Immortal',tiers:[24,25,26],color:rColor(24)},
    {label:'Radiant',tiers:[27],    color:rColor(27)},
  ];
  const rankGroup=document.getElementById('rank-check-group');
  // keep the label, remove old checkbox rows
  rankGroup.querySelectorAll('.filter-check').forEach(b=>b.remove());
  let anyRank=false;
  RANK_GROUP_DEFS.forEach(g=>{
    const hasMatches=allMatches.some(m=>m.avgRank!=null&&g.tiers.includes(Math.round(m.avgRank)));
    if(!hasMatches)return;
    anyRank=true;
    const lbl=document.createElement('label');
    lbl.className='filter-check';
    // Representative icon for the group — the 1 sub-tier (e.g. Ascendant 1).
    const repTier=g.tiers[0];
    lbl.innerHTML=`<input type="checkbox">${rankIcon(repTier,16)}<span>${g.label}</span>`;
    lbl.querySelector('input').addEventListener('change',e=>toggleRankFilter(g.label,e.target.checked));
    rankGroup.appendChild(lbl);
  });
  rankGroup.hidden=!anyRank;

  // Populate party size filter checkboxes
  const partyGroup=document.getElementById('party-check-group');
  partyGroup.querySelectorAll('.filter-check').forEach(b=>b.remove());
  const PARTY_LABELS={1:'Solo',2:'Duo',3:'Trio',4:'Quad',5:'5-Stack'};
  const partySizes=[...new Set(allMatches.map(m=>m.partySize||1))].sort((a,b)=>a-b);
  partySizes.forEach(sz=>{
    const lbl=document.createElement('label');
    lbl.className='filter-check';
    lbl.innerHTML=`<input type="checkbox"><span style="display:inline-flex">${partyIcon(sz)}</span><span>${PARTY_LABELS[sz]||sz+'-stack'}</span>`;
    lbl.querySelector('input').addEventListener('change',e=>togglePartyFilter(sz,e.target.checked));
    partyGroup.appendChild(lbl);
  });
  partyGroup.hidden=partySizes.length<=1; // nothing to filter if everyone's the same

  // Populate map filter checkboxes
  const mapGroup=document.getElementById('map-check-group');
  mapGroup.querySelectorAll('.filter-check').forEach(b=>b.remove());
  const maps=[...new Set(allMatches.map(m=>m.mapName).filter(n=>n&&n!=='Unknown'))].sort();
  maps.forEach(name=>{
    const lbl=document.createElement('label');
    lbl.className='filter-check';
    lbl.innerHTML=`<input type="checkbox"><span>${name}</span>`;
    lbl.querySelector('input').addEventListener('change',e=>toggleMapFilter(name,e.target.checked));
    mapGroup.appendChild(lbl);
  });
  mapGroup.hidden=maps.length<=1; // nothing to filter if only one map
  updateFilterCount();
  setStatus('',false);
  renderMatches();
}

/* ── TEAMMATES ───────────────────────────────────────────── */
// Shows Most Played With / Breakdown side by side when both have data;
// collapses to a single full-width column when only one does, and hides
// the row entirely when neither has anything to show.
// Hard-sets each K/D-by row's height so that a full page of 4 rows (plus the
// 3 gaps between them) occupies exactly the same vertical space as a full page
// of 5 teammate cards (plus their 4 gaps) in the card to the left. Measured
// from a real teammate card so it stays correct regardless of font rendering.
const TM_LIST_GAP=6, PB_LIST_GAP=6, PB_PER_PAGE=4;
// Makes the duo cards and the K/D rows exactly one height so the two columns
// align row-for-row. Clears every item first (so no stale height skews the
// measurement), takes the tallest natural item across BOTH columns, then stamps
// that single height on all of them.
function matchRankRowHeights(){
  const list=document.getElementById('teammate-list');
  const ro=document.getElementById('sg-rank-overview');
  const cards=list?[...list.querySelectorAll('.teammate-card')]:[];
  const rows=ro?[...ro.querySelectorAll('.pb-row')]:[];
  const all=cards.concat(rows);
  if(!all.length)return false;
  all.forEach(el=>{el.style.height='';});
  let itemH=0;
  all.forEach(el=>{const h=el.getBoundingClientRect().height;if(h>itemH)itemH=h;});
  itemH=Math.ceil(itemH);
  if(!itemH)return false;
  all.forEach(el=>{el.style.height=itemH+'px';});
  const listH=PB_PER_PAGE*itemH+(PB_PER_PAGE-1)*PB_LIST_GAP;
  if(ro)ro.style.minHeight=listH+'px';
  if(list)list.style.minHeight=listH+'px';
  return true;
}
// getBoundingClientRect() forces a synchronous layout, so if the section is
// already visible (the common case — toggling a filter, paginating, etc.)
// this measures and locks heights immediately, same tick, before the browser
// ever paints. That avoids a one-frame flash where fresh cards briefly show
// their natural (possibly mismatched) heights before snapping to the locked
// height — which is what showed up as the cards "jiggling" on toggle. The
// rAF-deferred retry is now only a fallback for the genuine edge case where
// the container isn't laid out yet (e.g. a parent still mid display:none).
function scheduleMatchRankRowHeights(){
  if(!matchRankRowHeights())requestAnimationFrame(()=>requestAnimationFrame(matchRankRowHeights));
}

function layoutTopRow(){
  const row=document.getElementById('top-row');
  const tmVisible=document.getElementById('teammates-section').style.display!=='none';
  const rankVisible=document.getElementById('sg-rank-card').style.display!=='none';
  if(!tmVisible&&!rankVisible){row.style.display='none';return;}
  row.style.display='grid';
  row.style.gridTemplateColumns=(tmVisible&&rankVisible)?'1fr 1fr':'1fr';
}

function buildTeammates(){
  const tmap={};
  // Only show the toggle at all when there are actual 5-stack games to count —
  // otherwise it'd be a control with no effect.
  const fiveStackCount=statMatches.filter(m=>(m.partySize||1)>=5).length;
  const toggleEl=document.getElementById('tm-5stack-toggle');
  if(toggleEl){
    toggleEl.hidden=fiveStackCount===0;
    const cb=document.getElementById('tm-5stack-cb');
    if(cb)cb.checked=tmIncludeFiveStack;
  }

  statMatches.forEach(m=>{
    if(!m.myStats)return;
    // Full 5-stacks are excluded by default — a premade team of 5 isn't a
    // "duo" — unless the person has explicitly opted in via the toggle above.
    if(!tmIncludeFiveStack&&(m.partySize||1)>=5)return;
    // Resolve "me" and my team once per match rather than once per teammate.
    const mePlayer=m.players.find(q=>PUUID?q.puuid===PUUID:q.name?.toLowerCase()===PLAYER.toLowerCase());
    const myTeamId=mePlayer?.team_id;
    const myTeam=m.players.filter(p=>p.team_id===myTeamId);
    myTeam.forEach(p=>{
      if(p===mePlayer)return;
      // Only count players who were in the same party (duo/trio/5-stack)
      if(!m.myPartyId||p.party_id!==m.myPartyId)return;
      const key=p.puuid||`${p.name}#${p.tag}`;
      if(!tmap[key])tmap[key]={name:p.name,tag:p.tag,key,games:0,wins:0,kills:0,deaths:0,rankSum:0,rankCount:0,acsSum:0,acsCount:0,placeSum:0,placeCount:0};
      tmap[key].games++;
      if(m.won===true)tmap[key].wins++;
      tmap[key].kills+=p._kills||0;
      tmap[key].deaths+=p._deaths||0;
      if(m.avgRank!=null){tmap[key].rankSum+=m.avgRank;tmap[key].rankCount++;}
      if(p._acs!=null){
        tmap[key].acsSum+=p._acs;tmap[key].acsCount++;
        // ACS placement (1 = highest) is precomputed per player at load.
        if(p._acsPlace!=null){tmap[key].placeSum+=p._acsPlace;tmap[key].placeCount++;}
      }
    });
  });

  allTeammates=Object.values(tmap).sort((a,b)=>b.games-a.games);
  tmPage=0;

  const hasTeammates=allTeammates.length>0;
  document.getElementById('teammates-section').style.display=hasTeammates?'block':'none';
  // renderTeammates() (when it runs) already schedules matchRankRowHeights itself
  // — calling it again here as well was causing a double layout-thrash (heights
  // reset to auto and re-measured/re-locked twice in quick succession) every
  // time this rebuilt interactively, which is what showed up as glitching when
  // toggling the 5-stack/reset switches. So this is now the only place that
  // schedules it, and only once, regardless of which branch runs.
  if(hasTeammates){
    renderTeammates();
  }else{
    scheduleMatchRankRowHeights();
  }
  layoutTopRow();
}

// Flip whether full 5-stacks count toward the Duos list, then rebuild it.
// buildTeammates() itself takes care of the layout/sizing follow-up.
function toggleFiveStackDuos(checked){
  tmIncludeFiveStack=!!checked;
  buildTeammates();
}

function renderTeammates(){
  const list=document.getElementById('teammate-list');
  list.innerHTML='';
  const pages=Math.ceil(allTeammates.length/TM_PER_PAGE);
  const slice=allTeammates.slice(tmPage*TM_PER_PAGE,(tmPage+1)*TM_PER_PAGE);
  slice.forEach((t,i)=>{
    const globalRank=tmPage*TM_PER_PAGE+i+1;
    const kd=t.deaths>0?(t.kills/t.deaths).toFixed(2):t.kills.toFixed(2);
    const wr=Math.round(t.wins/t.games*100);
    const kdClass=parseFloat(kd)>1?'tm-kd-good':parseFloat(kd)<1?'tm-kd-bad':'tm-kd-mid';
    const avgRankRaw=t.rankCount>0?t.rankSum/t.rankCount:null;
    const avgRankRR=avgRankRaw!=null?tierRR(avgRankRaw):null;
    const avgRankTier=avgRankRR?avgRankRR.tier:null;
    const row=document.createElement('div');
    row.className='teammate-card';
    const avgRankName=avgRankTier!=null?avgLabel(avgRankTier):'Unranked';
    row.innerHTML=`
      <div class="tm-head">
        <div class="tm-identity">
          <span class="tm-rank">#${globalRank}</span>
          <span class="tm-name-wrap"><span class="tm-name">${t.name}</span><span class="tm-tag">#${t.tag}</span></span>
        </div>
        <span class="tm-count"><span class="tm-count-games">${t.games} games</span><span class="tm-wr" style="color:${wr>=50?'#22c55e':'#ef4444'}">${wr}% WR</span></span>
      </div>
      <div class="tm-stats">
        <div class="tm-stat"><div class="tm-stat-lbl">K/D</div><div class="tm-stat-val ${kdClass}">${kd}</div></div>
        <div class="tm-stat"><div class="tm-stat-lbl">ACS</div><div class="tm-stat-val">${t.acsCount>0?Math.round(t.acsSum/t.acsCount):'—'}</div></div>
        <div class="tm-stat tm-stat-rank">
          <div class="tm-stat-lbl">Avg Lobby</div>
          <div class="tm-stat-rank-val">${avgRankTier!=null?rankIcon(avgRankTier,22):''}<span class="tm-stat-rank-text">${avgRankName}${avgRankRR!=null?`<span class="tm-stat-rank-num"> (${avgRankRR.rr} RR)</span>`:''}</span></div>
        </div>
      </div>
    `;

    list.appendChild(row);
  });

  const dots=document.getElementById('tm-dots');
  syncDots(dots,pages>1?pages:0,tmPage,(i)=>goToTmPage(i));

  // Size the duo cards to match the K/D rows and lock the list height so the
  // pagination nav never moves up on shorter pages.
  scheduleMatchRankRowHeights();
}

function goToTmPage(idx){
  if(idx===tmPage)return;
  const list=document.getElementById('teammate-list');
  const dir=idx>tmPage?1:-1;
  tmPage=idx;
  list.style.overflow='hidden';
  list.style.transition='opacity .15s ease,transform .15s ease';
  list.style.opacity='0';
  list.style.transform=`translateX(${dir*-14}px)`;
  setTimeout(()=>{
    renderTeammates();
    list.style.transition='none';
    list.style.transform=`translateX(${dir*14}px)`;
    void list.offsetWidth; // force reflow so the next transition runs
    list.style.transition='opacity .22s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1)';
    list.style.opacity='1';
    list.style.transform='translateX(0)';
  },150);
}

/* ── AVG LOBBY RANK TREND ───────────────────────────────────
   Line chart of avg lobby rank over time — the natural next step from the
   "Last 20 vs overall" figure in the hero card, but as an actual trend
   instead of a single before/after snapshot. Reuses the exact same
   "nice bucket size" date-bucketing algorithm as renderPlaytime (below) so
   both charts read consistently, but averages rank per bucket instead of
   summing duration, and renders as a line instead of bars since we care
   about the shape of the movement, not discrete totals per period. */
function renderRankTrend(matches){
  const container=document.getElementById('rank-trend-container');
  container.innerHTML='';
  if(chartInstances.rankTrend){chartInstances.rankTrend.destroy();delete chartInstances.rankTrend;}

  // Chronological order matters for a trend line — allMatches is usually
  // newest-first (match history order), so sort ascending here.
  const ranked=matches.filter(m=>m.startedAtMs!=null&&m.avgRank!=null)
    .slice().sort((a,b)=>a.startedAtMs-b.startedAtMs);
  if(ranked.length<2){document.getElementById('rank-trend-section').style.display='none';return;}

  const minMs=ranked[0].startedAtMs;
  const maxMs=ranked[ranked.length-1].startedAtMs;
  const spanDays=(maxMs-minMs)/86400000+1;
  const TARGET_POINTS=12;
  const NICE_BUCKET_DAYS=[1,2,3,5,7,14,21,30,45,60,90,120,182,365];
  const bucketDays=NICE_BUCKET_DAYS.find(n=>Math.ceil(spanDays/n)<=TARGET_POINTS)
    ??NICE_BUCKET_DAYS[NICE_BUCKET_DAYS.length-1];
  const useMonths=bucketDays>=28;
  const weeksPerBucket=(!useMonths&&bucketDays%7===0)?bucketDays/7:null;

  const dayStart=ms=>{const d=new Date(ms);return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();};
  const rangeStartMs=dayStart(minMs);
  const firstMonday=(()=>{
    const d=new Date(rangeStartMs);
    const dow=d.getDay();
    return new Date(d.getFullYear(),d.getMonth(),d.getDate()+((dow===0?-6:1)-dow)).getTime();
  })();
  function rangeLabel(startDate,endDate){
    const sm=startDate.toLocaleDateString('en-GB',{month:'short'});
    const em=endDate.toLocaleDateString('en-GB',{month:'short'});
    return sm===em?`${startDate.getDate()}–${endDate.getDate()} ${sm}`:`${startDate.getDate()} ${sm}–${endDate.getDate()} ${em}`;
  }

  const buckets={};
  ranked.forEach(m=>{
    const day=dayStart(m.startedAtMs);
    let sortVal;
    if(useMonths){
      const d=new Date(day);
      sortVal=new Date(d.getFullYear(),d.getMonth(),1).getTime();
    }else if(weeksPerBucket){
      const daysSinceMonday=Math.floor((day-firstMonday)/86400000);
      const idx=Math.floor(daysSinceMonday/(7*weeksPerBucket));
      sortVal=firstMonday+idx*7*weeksPerBucket*86400000;
    }else if(bucketDays===1){
      sortVal=day;
    }else{
      const daysSinceStart=Math.floor((day-rangeStartMs)/86400000);
      const idx=Math.floor(daysSinceStart/bucketDays);
      sortVal=rangeStartMs+idx*bucketDays*86400000;
    }
    if(!buckets[sortVal])buckets[sortVal]={sum:0,count:0,minDay:day,maxDay:day};
    const b=buckets[sortVal];
    b.sum+=m.avgRank;
    b.count++;
    if(day<b.minDay)b.minDay=day;
    if(day>b.maxDay)b.maxDay=day;
  });
  Object.values(buckets).forEach(b=>{
    b.label=useMonths
      ?new Date(b.minDay).toLocaleDateString('en-GB',{month:'short',year:'2-digit'})
      :(b.minDay===b.maxDay
        ?new Date(b.minDay).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
        :rangeLabel(new Date(b.minDay),new Date(b.maxDay)));
  });

  const sortedKeys=Object.keys(buckets).map(Number).sort((a,b)=>a-b);
  const labels=sortedKeys.map(k=>buckets[k].label);
  const avgTiers=sortedKeys.map(k=>buckets[k].sum/buckets[k].count);
  const counts=sortedKeys.map(k=>buckets[k].count);

  // Avg lobby rank across all solo games played on the most recent day (not
  // just the single latest match), so it reads as "how was I doing today"
  // rather than being swayed by one outlier game.
  const lastDayKey=new Date(ranked[ranked.length-1].startedAtMs).toDateString();
  const lastDayMatches=ranked.filter(m=>new Date(m.startedAtMs).toDateString()===lastDayKey);
  const lastDayAvg=lastDayMatches.reduce((a,m)=>a+m.avgRank,0)/lastDayMatches.length;
  const lastRR=tierRR(lastDayAvg);

  const card=document.createElement('div');
  card.className='chart-container';
  card.innerHTML=`
    <div class="card-title playtime-title">Avg Lobby Rank Trend (Solo)</div>
    <div class="playtime-head">
      <div class="playtime-total"><span class="playtime-total-val" style="display:inline-flex;align-items:center;gap:6px;">${rankIcon(lastRR.tier,22)}${avgLabel(lastRR.tier)} (${lastRR.rr} RR)</span><span class="playtime-total-lbl">avg across ${lastDayMatches.length} game${lastDayMatches.length===1?'':'s'} on ${dayHeaderLabel(ranked[ranked.length-1].startedAtMs)}</span></div>
      <div class="playtime-avgday"><span class="playtime-avgday-val">${ranked.length}</span><span class="playtime-avgday-lbl">solo games counted</span></div>
    </div>
    <div class="playtime-canvas-wrap"><canvas></canvas></div>
  `;
  container.appendChild(card);
  document.getElementById('rank-trend-section').style.display='block';

  const canvas=card.querySelector('canvas');
  const accentRgb=getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb').trim()||'59,130,246';

  // Y-axis min/max padded by half a tier on each side so the line never
  // touches the very top/bottom edge of the chart area.
  // Round to the nearest tier BEFORE padding by 0.5, so the axis bounds land
  // exactly on a true tier boundary (tier±0.5, per tierRR's convention).
  // Padding the raw decimal value directly was landing mid-tier instead,
  // which let the edge band's color bleed into the start of the next tier's
  // band — invisibly, since adjacent sub-tiers of the same rank share an
  // identical color (all three Immortal tiers are the same red) — making
  // that edge band look taller than the uniform ones in the middle.
  const yMin=Math.round(Math.min(...avgTiers))-0.5;
  const yMax=Math.round(Math.max(...avgTiers))+0.5;

  // Colors the plot area in horizontal bands, one per rank tier, using each
  // tier's actual color (same rColor() used everywhere else for this rank).
  // A tier's true span is [tier-0.5, tier+0.5] per tierRR()'s "whole numbers
  // center each division" convention — so this draws bands aligned to that,
  // meaning each labeled gridline sits centered inside its own band's color
  // rather than at a band edge, consistent with how rank math works
  // elsewhere in the app.
  const rankBandsPlugin={
    id:'rankBands',
    beforeDraw(chart){
      const {ctx,chartArea,scales:{y}}=chart;
      if(!chartArea)return;
      ctx.save();
      const top=Math.floor(y.min-0.5),bottom=Math.ceil(y.max+0.5);
      for(let t=top;t<bottom;t++){
        const bandTopVal=Math.min(t+0.5,y.max);
        const bandBottomVal=Math.max(t-0.5,y.min);
        if(bandBottomVal>=bandTopVal)continue;
        const pxTop=y.getPixelForValue(bandTopVal);
        const pxBottom=y.getPixelForValue(bandBottomVal);
        ctx.fillStyle=`rgba(${hexToRgb(rColor(t))},.16)`;
        ctx.fillRect(chartArea.left,pxTop,chartArea.right-chartArea.left,pxBottom-pxTop);
      }
      ctx.restore();
    }
  };

  chartInstances.rankTrend=new Chart(canvas,{
    type:'line',
    plugins:[rankBandsPlugin],
    data:{
      labels,
      datasets:[{
        label:'Avg Lobby Rank',
        data:avgTiers,
        borderColor:`rgba(${accentRgb},1)`,
        backgroundColor:(ctx)=>{
          const area=ctx.chart.chartArea;
          if(!area)return `rgba(${accentRgb},.15)`;
          const g=ctx.chart.ctx.createLinearGradient(0,area.top,0,area.bottom);
          g.addColorStop(0,`rgba(${accentRgb},.28)`);
          g.addColorStop(1,`rgba(${accentRgb},0)`);
          return g;
        },
        fill:true,
        tension:0.35,
        borderWidth:2.5,
        pointRadius:3,
        pointHoverRadius:5,
        pointBackgroundColor:`rgba(${accentRgb},1)`,
        pointBorderColor:'#0d0d10',
        pointBorderWidth:1.5,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{top:22,bottom:4}},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(10,10,12,.95)',
          borderColor:`rgba(${accentRgb},.4)`,
          borderWidth:1,
          padding:10,
          displayColors:false,
          titleFont:{family:'Geist',size:11,weight:'700'},
          bodyFont:{family:'Geist',size:11},
          callbacks:{
            title:()=>[],
            label:(item)=>{
              const rr=tierRR(item.raw);
              const c=counts[item.dataIndex];
              return[`${avgLabel(rr.tier)} (${rr.rr} RR)`,`${c} game${c===1?'':'s'}`];
            }
          }
        }
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{color:'#6b7280',font:{family:'Geist',size:10},maxRotation:0,autoSkip:true,maxTicksLimit:labels.length},
          border:{display:true,color:'rgba(255,255,255,.12)'}
        },
        y:{
          min:yMin,
          max:yMax,
          grid:{color:'rgba(255,255,255,.05)',z:-1},
          ticks:{
            color:'#6b7280',font:{family:'Geist',size:10},
            // One tick per whole tier so the axis reads as rank names
            // ("Asc 2", "Imm 1"...) instead of raw decimal values.
            stepSize:1,
            callback:(v)=>avgLabelShort(Math.round(v)),
          },
          border:{display:false}
        }
      }
    }
  });
}

/* ── PLAYTIME ────────────────────────────────────────────── */
function renderPlaytime(){
  const container=document.getElementById('playtime-container');
  container.innerHTML='';
  if(chartInstances.playtime){chartInstances.playtime.destroy();delete chartInstances.playtime;}

  // Playtime always counts every match, including post-reset placement games —
  // unlike the rank/K-D stats above, it isn't gated by mhIncludeReset, since
  // time spent playing placements is real playtime either way.
  const withDur=allMatches.filter(m=>m.startedAtMs!=null&&m.durationMs!=null&&m.durationMs>0);
  if(!withDur.length){document.getElementById('playtime-section').style.display='none';return;}

  // Pick a bucket size that keeps the number of bars in a sensible range
  // regardless of how far apart matches are — rather than jumping straight
  // from 1-day to 7-day to 30-day buckets, which left awkward cases like 3
  // weeks of data rendering as only 3 (very wide) bars. Instead we scale
  // through a "nice" set of bucket sizes (in days) and pick the smallest one
  // that keeps the bar count at or under TARGET_BARS.
  const minMs=Math.min(...withDur.map(m=>m.startedAtMs));
  const maxMs=Math.max(...withDur.map(m=>m.startedAtMs));
  const spanDays=(maxMs-minMs)/86400000+1; // inclusive of both end days
  const TARGET_BARS=12;
  const NICE_BUCKET_DAYS=[1,2,3,5,7,14,21,30,45,60,90,120,182,365];
  const bucketDays=NICE_BUCKET_DAYS.find(n=>Math.ceil(spanDays/n)<=TARGET_BARS)
    ??NICE_BUCKET_DAYS[NICE_BUCKET_DAYS.length-1];
  // 28+ day buckets read far more naturally aligned to real calendar months
  // (variable length) than as a rolling N-day window, so switch to that once
  // we're in "roughly monthly" territory.
  const useMonths=bucketDays>=28;
  // Multiples of 7 (7, 14, 21) look better aligned to real Monday-start weeks
  // than to an arbitrary rolling window starting on whatever day the first
  // match happened to fall on.
  const weeksPerBucket=(!useMonths&&bucketDays%7===0)?bucketDays/7:null;

  const dayStart=ms=>{const d=new Date(ms);return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();};
  const rangeStartMs=dayStart(minMs);
  // Monday of the week containing the first match, used as the anchor for
  // week-aligned buckets so grouping matches how a calendar actually reads.
  const firstMonday=(()=>{
    const d=new Date(rangeStartMs);
    const dow=d.getDay();
    return new Date(d.getFullYear(),d.getMonth(),d.getDate()+((dow===0?-6:1)-dow)).getTime();
  })();

  // Formats a start/end pair as "22–28 Jun" (same month) or "29 Jun–5 Jul"
  // (spanning months), so a multi-day bucket never reads as a single date.
  function rangeLabel(startDate,endDate){
    const sm=startDate.toLocaleDateString('en-GB',{month:'short'});
    const em=endDate.toLocaleDateString('en-GB',{month:'short'});
    return sm===em?`${startDate.getDate()}–${endDate.getDate()} ${sm}`:`${startDate.getDate()} ${sm}–${endDate.getDate()} ${em}`;
  }

  const buckets={};
  withDur.forEach(m=>{
    const day=dayStart(m.startedAtMs);
    let sortVal;
    if(useMonths){
      const d=new Date(day);
      sortVal=new Date(d.getFullYear(),d.getMonth(),1).getTime();
    }else if(weeksPerBucket){
      const daysSinceMonday=Math.floor((day-firstMonday)/86400000);
      const idx=Math.floor(daysSinceMonday/(7*weeksPerBucket));
      sortVal=firstMonday+idx*7*weeksPerBucket*86400000;
    }else if(bucketDays===1){
      sortVal=day;
    }else{
      // Arbitrary N-day rolling window anchored to the first match's day.
      const daysSinceStart=Math.floor((day-rangeStartMs)/86400000);
      const idx=Math.floor(daysSinceStart/bucketDays);
      sortVal=rangeStartMs+idx*bucketDays*86400000;
    }
    if(!buckets[sortVal])buckets[sortVal]={ms:0,count:0,minDay:day,maxDay:day};
    const b=buckets[sortVal];
    b.ms+=m.durationMs;
    b.count++;
    if(day<b.minDay)b.minDay=day;
    if(day>b.maxDay)b.maxDay=day;
  });

  // Label each bucket off the actual earliest/latest day it contains matches
  // for — not the theoretical full bucket window. A 2-day bucket where only
  // the second day has games should read "3 Jul", not "2–3 Jul" (which
  // implied a match happened on the 2nd too).
  Object.values(buckets).forEach(b=>{
    b.label=useMonths
      ?new Date(b.minDay).toLocaleDateString('en-GB',{month:'short',year:'2-digit'})
      :(b.minDay===b.maxDay
        ?new Date(b.minDay).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
        :rangeLabel(new Date(b.minDay),new Date(b.maxDay)));
  });

  const sortedKeys=Object.keys(buckets).map(Number).sort((a,b)=>a-b);
  const labels=sortedKeys.map(k=>buckets[k].label);
  const hours=sortedKeys.map(k=>+(buckets[k].ms/3600000).toFixed(2));
  const counts=sortedKeys.map(k=>buckets[k].count);

  const totalMs=withDur.reduce((s,m)=>s+m.durationMs,0);
  const totalH=Math.floor(totalMs/3600000);
  const totalM=Math.round((totalMs%3600000)/60000);

  // Average hours per day. Now that we know each act's real start date
  // (fetched via loadSeasonDates → _actMeta, or the hardcoded snapshot when
  // that fetch fails), we can measure this against the season itself — total
  // playtime ÷ calendar days elapsed since the season started — rather than
  // only the days the player happened to play. Only shown when we actually
  // know the targeted season's start date (live data or the hardcoded
  // snapshot); with no season targeted, or one absent from both sources,
  // the figure is simply omitted rather than falling back to an estimate.
  const seasonStartMs=getActInfoByUuid(TARGET_SEASON)?.start??null;
  const avgHoursPerDay=seasonStartMs!=null
    ?(totalMs/3600000/Math.max(1,Math.ceil((Date.now()-seasonStartMs)/86400000))).toFixed(1)
    :null;

  const card=document.createElement('div');
  card.className='chart-container';
  card.innerHTML=`
    <div class="card-title playtime-title">Playtime</div>
    <div class="playtime-head">
      <div class="playtime-total"><span class="playtime-total-val">${totalH}h ${totalM}m</span><span class="playtime-total-lbl">across ${withDur.length} match${withDur.length===1?'':'es'}</span></div>
      ${avgHoursPerDay!=null?`<div class="playtime-avgday"><span class="playtime-avgday-val">${avgHoursPerDay}h</span><span class="playtime-avgday-lbl">per day since season start</span></div>`:''}
    </div>
    <div class="playtime-canvas-wrap"><canvas></canvas></div>
  `;
  container.appendChild(card);
  document.getElementById('playtime-section').style.display='block';

  const canvas=card.querySelector('canvas');
  const accentRgb=getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb').trim()||'59,130,246';
  // Darkened (but still fully opaque) version of the accent color for the
  // bottom of the bar gradient — using alpha-fade here instead would let
  // the y-axis grid lines show through wherever they cross a bar.
  const accentDarkRgb=accentRgb.split(',').map(n=>Math.round(parseFloat(n)*0.28)).join(',');
  function barFill(ctx,hover){
    const area=ctx.chart.chartArea;
    if(!area)return `rgba(${accentRgb},1)`;
    const g=ctx.chart.ctx.createLinearGradient(0,area.top,0,area.bottom);
    g.addColorStop(0,hover?`rgba(${accentRgb},1)`:`rgba(${accentRgb},.9)`);
    g.addColorStop(1,`rgba(${accentDarkRgb},1)`);
    return g;
  }

  chartInstances.playtime=new Chart(canvas,{
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'Hours Played',
        data:hours,
        backgroundColor:(ctx)=>barFill(ctx,false),
        hoverBackgroundColor:(ctx)=>barFill(ctx,true),
        borderColor:`rgba(${accentRgb},.9)`,
        borderWidth:1,
        borderRadius:5,
        borderSkipped:false,
        // Previously capped at a flat 46px, which left huge gaps whenever there
        // were only a few bars (e.g. 3 weeks of data in a wide chart). Now bars
        // fill most of their category slot (barPercentage/categoryPercentage)
        // and only hit the hard ceiling (maxBarThickness) once there are many
        // categories crammed in (e.g. daily granularity over two weeks).
        barPercentage:0.7,
        categoryPercentage:0.85,
        maxBarThickness:90,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{top:22,bottom:4}},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(10,10,12,.95)',
          borderColor:`rgba(${accentRgb},.4)`,
          borderWidth:1,
          padding:10,
          displayColors:false,
          titleFont:{family:'Geist',size:11,weight:'700'},
          bodyFont:{family:'Geist',size:11},
          callbacks:{
            title:()=>[], // no date heading — empty array fully collapses the title row
            label:(item)=>{
              const h=item.raw;
              const hh=Math.floor(h);
              const mm=Math.round((h-hh)*60);
              const c=counts[item.dataIndex];
              return[`${hh}h ${mm}m played`,`${c} match${c===1?'':'es'}`];
            }
          }
        }
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{color:'#6b7280',font:{family:'Geist',size:10},maxRotation:0,autoSkip:true,maxTicksLimit:labels.length},
          border:{display:true,color:'rgba(255,255,255,.12)'}
        },
        y:{
          beginAtZero:true,
          grid:{color:'rgba(255,255,255,.05)',z:-1},
          ticks:{color:'#6b7280',font:{family:'Geist',size:10},callback:(v)=>v+'h'},
          border:{display:false}
        }
      }
    }
  });
}

// Shared row-builder for both "by my rank" and "by avg lobby rank" views —
// they differ only in how each match is bucketed.
function buildKdRankRows(bucketFn){
  const rb={};
  statMatches.filter(m=>m.myStats).forEach(m=>{
    const info=bucketFn(m);
    if(!info)return;
    const t=info.tier;
    if(!rb[t])rb[t]={totalKills:0,totalDeaths:0,wins:0,total:0,label:info.label,icon:info.icon,acsSum:0,acsCount:0,placeSum:0,placeCount:0};
    rb[t].total++;
    if(m.won===true)rb[t].wins++;
    if(m.myStats.kills!=null)rb[t].totalKills+=m.myStats.kills;
    if(m.myStats.deaths!=null)rb[t].totalDeaths+=m.myStats.deaths;
    if(m.myStats.acs!=null){
      rb[t].acsSum+=m.myStats.acs;rb[t].acsCount++;
      // My ACS placement in the match is precomputed once at load (m.myAcsPlace),
      // so this no longer re-sorts every match's players on each of the 3 mode
      // builds per render.
      if(m.myAcsPlace!=null){rb[t].placeSum+=m.myAcsPlace;rb[t].placeCount++;}
    }
  });

  return Object.keys(rb).map(Number).sort((a,b)=>a-b).map(t=>{
    const b=rb[t];
    const kdRaw=b.totalDeaths>0?b.totalKills/b.totalDeaths:null;
    const kd=kdRaw!=null?kdRaw.toFixed(2):(b.totalKills>0?b.totalKills.toFixed(2):'—');
    const wr=Math.round(b.wins/b.total*100);
    const kdColor=kdRaw==null?'var(--muted)':kdRaw>1?'#22c55e':kdRaw<1?'#ef4444':'var(--text)';
    const wrColor=wr>=50?'#22c55e':'#ef4444';
    const avgAcsB=b.acsCount>0?Math.round(b.acsSum/b.acsCount):null;
    const avgPlaceB=b.placeCount>0?(b.placeSum/b.placeCount).toFixed(1):null;
    const icon=b.icon??rankIcon(t,28);
    const row=document.createElement('div');
    row.className='pb-row';
    row.innerHTML=`
      <div class="pb-row-head">
        <div class="pb-identity"><span class="pb-icon">${icon}</span><span class="pb-label">${b.label}</span></div>
        <span class="pb-matches">${b.total} match${b.total===1?'':'es'}</span>
      </div>
      <div class="pb-stats">
        <div class="pb-stat"><div class="pb-stat-lbl">K/D</div><div class="pb-stat-val" style="color:${kdColor}">${kd}</div></div>
        <div class="pb-stat"><div class="pb-stat-lbl">ACS</div><div class="pb-stat-val">${avgAcsB??'—'}</div></div>
        <div class="pb-stat"><div class="pb-stat-lbl">Avg Place</div><div class="pb-stat-val">${avgPlaceB??'—'}</div></div>
        <div class="pb-stat pb-stat-right"><div class="pb-stat-lbl">Win Ratio</div><div class="pb-stat-val" style="color:${wrColor}">${wr}%</div></div>
      </div>`;
    return row;
  });
}

/* ── CLUTCHES (1v1–1v5) ─────────────────────────────────── */
// Aggregates myClutchAll (computed per match in processMatch — see the 1vX
// detection block there) across every match in scope. Uses the same match
// scope as the rest of the Stats panel (always counts placement games, all
// party sizes).
function renderClutchCard(matches){
  const totals={1:{win:0,loss:0,exit:0,save:0},2:{win:0,loss:0,exit:0,save:0},3:{win:0,loss:0,exit:0,save:0},4:{win:0,loss:0,exit:0,save:0},5:{win:0,loss:0,exit:0,save:0}};
  matches.forEach(m=>{
    if(!m.myClutchAll)return;
    for(let t=1;t<=5;t++){
      const s=m.myClutchAll[t];
      if(!s)continue;
      totals[t].win+=s.win||0;totals[t].loss+=s.loss||0;
      totals[t].exit+=s.exit||0;totals[t].save+=s.save||0;
    }
  });
  const grandTotal=Object.values(totals).reduce((a,t)=>a+t.win+t.loss+t.exit+t.save,0);
  const row=document.getElementById('clutch-section-row');
  if(!grandTotal){row.style.display='none';return;}
  row.style.display='block';

  // Per-type pills — win rate across every clutch situation of that type
  // (win / total), same as before the 4-outcome redefinition.
  const grid=document.getElementById('clutch-grid');
  // Colors follow the same progression vlr.gg uses on its multi-kill columns
  // (2K green → 3K teal → 4K blue → 5K purple) — applied here to clutch
  // difficulty instead of kill count, so 1v1 (easiest) is green and 1v5
  // (hardest) is purple, with the intermediate tiers stepping through the
  // same teal/blue/indigo progression.
  const CLUTCH_COLORS={1:'#22c55e',2:'#14b8a6',3:'#3b82f6',4:'#6366f1',5:'#a855f7'};
  grid.innerHTML=[1,2,3,4,5].map(t=>{
    const{win,loss,exit,save}=totals[t];
    const situations=win+loss+exit+save;
    const pct=situations?Math.round(win/situations*100):null;
    const val=pct!=null?`${pct}%`:'—';
    const lbl=situations?`1v${t} (${win}/${situations})`:`1v${t}`;
    const bg=situations?CLUTCH_COLORS[t]:'rgba(255,255,255,0.05)';
    return `<div class="tm-pill" style="flex:1;padding:14px 10px;background:${bg};border-color:transparent;"><div class="tm-pill-val" style="font-size:1.4rem;color:#fff;">${val}</div><div class="tm-pill-lbl" style="color:#fff;opacity:${situations?.85:.4};">${lbl}</div></div>`;
  }).join('');

  // Outcome breakdown — every clutch situation, across all types, split into
  // the 4 possible outcomes. This is the headline view for "do they even try":
  // Win/Loss are genuine attempts; Exit/Save are not (see processMatch for
  // the exact classification, which weighs time-remaining-on-clock and
  // enemies-still-alive rather than a flat timer).
  let win=0,loss=0,exit=0,save=0;
  Object.values(totals).forEach(t=>{win+=t.win;loss+=t.loss;exit+=t.exit;save+=t.save;});
  const behaviorEl=document.getElementById('clutch-behavior');
  behaviorEl.style.display='block';
  const attemptPct=Math.round((win+loss)/grandTotal*100);
  document.getElementById('clutch-avg-time').textContent=`${attemptPct}% genuinely attempted`;
  const bar=document.getElementById('clutch-behavior-bar');
  bar.innerHTML=[
    ['seg-win',win],['seg-loss',loss],['seg-exit',exit],['seg-save',save]
  ].filter(([,c])=>c>0).map(([cls,c])=>
    `<div class="${cls}" style="width:${(c/grandTotal*100).toFixed(2)}%"></div>`
  ).join('');
  const legend=document.getElementById('clutch-behavior-legend');
  const pct=c=>Math.round(c/grandTotal*100);
  legend.innerHTML=`
    <span class="clutch-legend-item" title="Won the round — killed everyone, defused, or both"><span class="clutch-legend-dot seg-win"></span>Win: <strong>${win}</strong> (${pct(win)}%)</span>
    <span class="clutch-legend-item" title="Genuinely tried to win the round and lost — died holding, or the bomb went off while contesting it"><span class="clutch-legend-dot seg-loss"></span>Loss: <strong>${loss}</strong> (${pct(loss)}%)</span>
    <span class="clutch-legend-item" title="Didn't attempt to win — took a trade/pick for stat value instead of playing for the round"><span class="clutch-legend-dot seg-exit"></span>Exit: <strong>${exit}</strong> (${pct(exit)}%)</span>
    <span class="clutch-legend-item" title="Didn't attempt to win and got no value either — let the timer run out or never went for the defuse"><span class="clutch-legend-dot seg-save"></span>Save: <strong>${save}</strong> (${pct(save)}%)</span>
  `;
}


function renderRankByRankCard(){
  rankModeRows.player=buildKdRankRows(m=>{
    if(m.myTierId==null||m.myTierId<3)return null;
    return{tier:m.myTierId,label:m.myTierName};
  });
  rankModeRows.lobby=buildKdRankRows(m=>{
    if(m.avgRank==null)return null;
    const t=Math.round(m.avgRank);
    if(t<3)return null;
    return{tier:t,label:avgLabel(t)};
  });
  rankModeRows.party=buildKdRankRows(m=>{
    const sz=m.partySize||1;
    return{tier:sz,label:PARTY_LABELS[sz]||sz+'-Stack',icon:partyIcon(sz)};
  });

  // Party is only meaningful with 2+ distinct sizes represented — a single
  // bucket ("100% Solo") isn't a breakdown worth showing.
  const availability={
    player:rankModeRows.player.length>0,
    lobby:rankModeRows.lobby.length>0,
    party:rankModeRows.party.length>1,
  };
  const availableModes=RANK_MODE_ORDER.filter(m=>availability[m]);

  if(!availableModes.length){
    document.getElementById('sg-rank-card').style.display='none';
    return;
  }

  document.getElementById('sg-rank-card').style.display='block';
  document.getElementById('rank-mode-toggle').style.display=availableModes.length>1?'flex':'none';
  RANK_MODE_ORDER.forEach(m=>{
    document.getElementById('rmt-'+m).style.display=availability[m]?'':'none';
  });
  const defaultMode=availability.lobby?'lobby':availableModes[0];
  applyRankMode(defaultMode);
}

function applyRankMode(mode,animate){
  const prevMode=currentRankMode;
  currentRankMode=mode;
  RANK_MODE_ORDER.forEach(m=>{
    document.getElementById('rmt-'+m).classList.toggle('active',mode===m);
  });
  const ro=document.getElementById('sg-rank-overview');
  const dotsEl=document.getElementById('sg-rank-dots');

  if(!animate){
    paginateRows(ro,dotsEl,rankModeRows[mode]||[],4,false,matchRankRowHeights);
    ro.style.display='flex';
    ro.className='party-breakdown';
    matchRankRowHeights();
    return;
  }

  const dir=RANK_MODE_ORDER.indexOf(mode)>RANK_MODE_ORDER.indexOf(prevMode)?1:-1;
  const startH=ro.getBoundingClientRect().height;

  ro.style.overflow='hidden';
  ro.style.height=startH+'px';
  ro.style.minHeight='';
  ro.style.transition='opacity .15s ease,transform .15s ease';
  ro.style.opacity='0';
  ro.style.transform=`translateX(${dir*-14}px)`;
  setTimeout(()=>{
    // skipHeightLock=true — we're driving the height animation ourselves below,
    // so paginateRows' own minHeight bookkeeping would only fight with it.
    paginateRows(ro,dotsEl,rankModeRows[mode]||[],4,true,matchRankRowHeights);
    ro.style.display='flex';
    ro.className='party-breakdown';
    matchRankRowHeights();

    // Measure the new content's natural height, then snap back to the old
    // height so the transition below has a real start point to animate from.
    ro.style.height='';
    const endH=ro.offsetHeight;
    ro.style.height=startH+'px';
    ro.style.transition='none';
    ro.style.transform=`translateX(${dir*14}px)`;
    void ro.offsetWidth; // force reflow so the next transition runs
    ro.style.transition='opacity .22s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1),height .28s cubic-bezier(.22,1,.36,1)';
    ro.style.opacity='1';
    ro.style.transform='translateX(0)';
    ro.style.height=endH+'px';

    // Once the height settles, hand control back to plain minHeight so
    // clicking this mode's own page dots afterward behaves like every other
    // paginated list in the app.
    setTimeout(()=>{
      ro.style.transition='';
      ro.style.height='';
      ro.style.minHeight=endH+'px';
      ro.style.overflow='';
    },300);
  },150);
}

function setRankMode(mode){
  if(mode===currentRankMode)return;
  applyRankMode(mode,true);
}
