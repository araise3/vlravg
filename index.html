// ── TEMP DEBUG — quota inspector ──────────────────────────────────────────
// Surfaces the live quota picture read from the ratelimit headers so we can
// watch the client's request timing in real time. Also times the whole fetch
// run and derives an overall req/min from it. Ripped out later — this block and
// its call sites are tagged "TEMP DEBUG".
let __debugRunStart=0;   // ms timestamp when the current run began
let __debugRunEnd=0;     // ms timestamp when it finished (0 while in progress)
let __debugReqCount=0;   // API requests made this run (kept for context)
function __debugResetRate(){
  __debugRunStart=Date.now();__debugRunEnd=0;__debugReqCount=0;
  const el=document.getElementById('debug-rate');if(el)el.style.display='none';
}
function __debugTrackReq(){__debugReqCount++;}            // call per API request
function __debugFinishRun(){__debugRunEnd=Date.now();__debugShowQuota({});} // freeze timer + repaint
// Elapsed seconds for the run (live while running, frozen once finished).
function __debugElapsedS(){
  if(!__debugRunStart)return 0;
  return ((__debugRunEnd||Date.now())-__debugRunStart)/1000;
}
function __debugShowQuota(q){
  const el=document.getElementById('debug-rate');if(!el)return;
  const bits=[];
  if(q.waited)bits.push(`waited ${(q.waited/1000).toFixed(1)}s`);
  const elapsed=__debugElapsedS();
  if(elapsed>0){
    const rpm=__debugReqCount/(elapsed/60);
    const done=__debugRunEnd?' done':'';
    bits.push(`${elapsed.toFixed(1)}s${done} · ${__debugReqCount} reqs · ${rpm.toFixed(1)} req/min`);
  }
  el.textContent=`[debug] ${bits.join(' · ')||'…'}`;
  el.style.display=bits.length?'block':'none';
}
// ── END TEMP DEBUG ─────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────
//  Rate-limit ledger — a tiny model of the server's per-1-min quota window,
//  kept in sync from response headers so callers can look BEFORE they leap.
// ─────────────────────────────────────────────────────────────────────────
// Rate limiting (pacing, quota tracking, gliding) now lives entirely in the
// worker — see functions/api/[[path]].js. The client has no quota state of
// its own anymore; apiGet() below just fires requests and reacts to a 429 by
// reading retryAfterMs out of the response body.

const MIN_RATED=7; // strict: a match needs at least this many rated players (of 10) for its lobby rank to count

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// Pull a machine-readable error code out of HenrikDev's {status,errors:[{code,…}]}
// body when available, so messages are specific (see docs → Error Codes).
async function parseApiError(r){
  try{
    const b=await r.json();
    const e=b?.errors?.[0];
    if(e)return `API ${r.status} (code ${e.code}): ${e.message||'error'}`;
  }catch(_){/* non-JSON body */}
  return `API ${r.status}`;
}

// ─────────────────────────────────────────────────────────────────────────
//  apiGet — the single entry point for every HenrikDev call.
//
//  Pacing (spacing requests, gliding as quota runs low) now lives entirely in
//  the worker, coordinated across every concurrent user of the app — see
//  functions/api/[[path]].js. This function just fires requests and, on a
//  429, waits however long the worker's response body says to.
//
//  Returns { j } — `rem` was dropped from the return shape since the client
//  no longer has quota numbers to report; no call site was reading it.
// ─────────────────────────────────────────────────────────────────────────
async function apiGet(url,opts={},_attempt=0,_rl=0){
  const MAX_RETRIES=5;   // hard failures (network / 5xx)
  const MAX_RL_WAITS=40; // 429 waits within one call (each waits the real reset)

  __debugTrackReq(); // TEMP DEBUG — count every network attempt (incl. retries/429s)

  let r;
  try{
    r=await fetch(url);
  }catch(e){
    // fetch() itself threw → network/CORS failure (e.g. proxy 5xx with no CORS).
    if(_attempt>=MAX_RETRIES)throw new Error('Network error — check your connection');
    const wait=Math.min(1500*Math.pow(2,_attempt),20000);
    setStatus(`Network error — retrying in ${Math.ceil(wait/1000)}s… (${_attempt+1}/${MAX_RETRIES})`,true);
    await sleep(wait);
    return apiGet(url,opts,_attempt+1,_rl);
  }

  // 1) 429 — the worker either declined before calling upstream (shared quota
  //    already exhausted this window) or relayed a real 429 from HenrikDev.
  //    Either way, the body tells us exactly how long to wait — no headers
  //    involved anymore. Floor the wait so we can never retry into the same
  //    just-exhausted window microseconds later.
  if(r.status===429){
    if(_rl>=MAX_RL_WAITS)throw new Error('Rate limited — please try again in a minute');
    let retryMs=RL_WAIT_FLOOR_MS;
    try{
      const body=await r.json();
      if(typeof body.retryAfterMs==='number')retryMs=Math.max(body.retryAfterMs,RL_WAIT_FLOOR_MS);
    }catch(_){/* fall back to the floor if the body isn't as expected */}
    const wait=Math.min(retryMs,MAX_WAIT_MS);
    __debugShowQuota({waited:wait}); // TEMP DEBUG
    setStatus(`Rate limit reached — waiting ${Math.ceil(wait/1000)}s for reset…`,true);
    await sleep(wait);
    return apiGet(url,opts,_attempt,_rl+1);
  }

  // 2) Transient server errors — exponential backoff.
  if([500,502,503,504].includes(r.status)){
    if(_attempt>=MAX_RETRIES)throw new Error(await parseApiError(r));
    const wait=Math.min(1000*Math.pow(2,_attempt),16000); // 1,2,4,8,16s
    setStatus(`Server error (${r.status}) — retrying in ${Math.ceil(wait/1000)}s… (${_attempt+1}/${MAX_RETRIES})`,true);
    await sleep(wait);
    return apiGet(url,opts,_attempt+1,_rl);
  }

  // 3) Other non-OK (400/401/403/404…) — not retryable, surface the real reason.
  if(!r.ok)throw new Error(await parseApiError(r));

  __debugShowQuota({}); // TEMP DEBUG
  const j=await r.json();
  return{j};
}

// Back-compat alias — older call sites referenced fetchWithRetry by name.
const fetchWithRetry=apiGet;


function isSeason(m){
  if(!TARGET_SEASON)return true;
  const sid=m.metadata?.season?.id||m.metadata?.season_id||'';
  return sid===TARGET_SEASON||sid.includes(TARGET_SEASON.slice(0,8));
}
/* ── PROCESS MATCH ──────────────────────────────────────── */
function processMatch(m){
  // TEMP DEBUG — keep every raw match object around on window so a specific
  // one can be found and copied out of the console (for calibrating the
  // clutch-outcome logic against real examples). Remove once no longer needed.
  (window.__rawMatches??=[]).push(m);

  const meta=m.metadata||{};
  const players=m.players||[];

  // Prefer PUUID lookup (works across name changes); fall back to name+tag
  const me=players.find(p=>PUUID?p.puuid===PUUID:
    p.name?.toLowerCase().trim()===PLAYER.toLowerCase().trim()&&p.tag?.toLowerCase().trim()===TAG.toLowerCase().trim()
  );
  const myTeamId=me?.team_id?.toLowerCase();

  // 1vX clutch detection — reconstructed from the raw kills array (each kill
  // event carries an explicit round index + killer/victim team), since the
  // API doesn't expose a pre-computed clutch flag anywhere (checked: neither
  // the round object nor its per-player round-stats entries have one).
  // Since myAlive only ever counts down through a round, it becomes 1 at most
  // once — whatever enemyAlive happens to be at that exact moment is the
  // clutch type (1v1 through 1v5).
  //
  // Every clutch situation resolves into exactly ONE of four outcomes:
  //   WIN  — team won the round (killed everyone / defused / both — the API
  //          doesn't let us cheaply distinguish which, so this stays one
  //          bucket for now).
  //   LOSS — a genuine attempt that failed: died while actually trying
  //          (held for a while before dying), or got caught immediately
  //          with nothing to show for it. Either way: they died, or the
  //          round was lost while they were actively contesting it.
  //   EXIT — never really tried to WIN the round, just took a trade/pick for
  //          stat value (got a kill) — whether or not they died afterward.
  //   SAVE — never tried and never got value either: survived to the round's
  //          end (spike went off / timer ran out) without a single kill —
  //          i.e. held their gun and let it happen rather than contesting.
  //
  // The dividing line between "genuine attempt" (LOSS) and "didn't really
  // try" (EXIT) is primarily about whether they were actually ENGAGED through
  // their available window, not just the state at their final kill/death —
  // see IDLE_RATIO_THRESHOLD below for why that mattered.
  const clutchAllByPuuid=new Map();
  const clutchRoundsByPuuid=new Map(); // puuid -> [{round, type, outcome}, ...] — per-round detail, used by the clutch debug panel
  // Round-timer and post-plant spike-timer durations — Riot's raw round data
  // doesn't expose "time remaining," only the round-relative timestamp each
  // event happened at (time_in_round_in_ms) and, when applicable, when the
  // spike was planted (rounds[r].plant.round_time_in_ms). Combined with these
  // two constants, that's enough to derive how much time was actually left on
  // the clock/spike at any given moment.
  // The documented nominal values are 100s/45s, but checking real match data
  // (113 matches) found kills landing up to 106.7s into unplanted rounds and
  // 51.1s after plant in rounds that still ended by detonation — consistently
  // ~6-7s past the nominal timer in both cases. That's small and uniform
  // enough to read as a shared "round conclusion" grace period (trailing
  // damage/kills already in flight resolving after the timer nominally hits
  // zero) rather than the constants themselves being wrong, so both are
  // padded by 8s to comfortably cover it. Getting this right matters — a
  // window that ends too early caused idleRatio to come out above 1.0 for
  // genuine late-round action, which would silently mis-flag it as idle.
  const ROUND_TIMER_MS=108000;
  const SPIKE_TIMER_MS=53000;
  // How much of their available window (from becoming last-alive, or the
  // plant if later, through to detonation/round-timer-expiry) can go by with
  // zero engagement before a late kill stops counting as a real attempt.
  // Real examples exposed why this matters: a player who sits completely
  // still for 30-50+ seconds of a 35-45s window, then only fights back in the
  // final few seconds because an enemy happened to walk up to them, was never
  // making a play for the win — the earlier silence (not pushing, rotating,
  // or even repositioning toward the objective) is the actual signal, not
  // however the last few seconds happened to look. 0.5 = idle for at least
  // half their available window.
  const IDLE_RATIO_THRESHOLD=0.5;
  if(Array.isArray(m.kills)&&Array.isArray(m.rounds)){
    const killsByRound=[];
    m.kills.forEach(k=>{(killsByRound[k.round]??=[]).push(k);});
    killsByRound.forEach(arr=>arr.sort((a,b)=>(a.time_in_round_in_ms??0)-(b.time_in_round_in_ms??0)));
    // Real-death pre-pass — resurrection abilities (Clove's ultimate, most
    // notably) mean a "death" in the kill feed isn't always permanent: a
    // player can die, then get credited a kill afterward (confirmed against
    // real match data — a player died, then got 3 more kills later in the
    // same round). Death is only treated as final here if there's no later
    // kill credited to that same puuid in the same round; otherwise it's
    // skipped when tallying who's still alive. This also naturally covers
    // duplicate death log entries (the earlier-confirmed data quirk where
    // the same real death shows up twice at different timestamps) — with no
    // kill credit in between, the FIRST occurrence is correctly kept as the
    // real one, same as before.
    const realDeathByRound=[];
    for(let r=0;r<killsByRound.length;r++){
      const rk=killsByRound[r]||[];
      const victimTimes={},killerTimes={};
      for(const k of rk){
        const vp=k.victim?.puuid,kp=k.killer?.puuid,t=k.time_in_round_in_ms??0;
        if(vp)(victimTimes[vp]??=[]).push(t);
        if(kp&&kp!==vp)(killerTimes[kp]??=[]).push(t);
      }
      const realDeath={};
      for(const puuid in victimTimes){
        const vts=victimTimes[puuid];
        const kts=killerTimes[puuid]||[];
        for(const t of vts){
          if(!kts.some(kt=>kt>t)){realDeath[puuid]=t;break;}
        }
      }
      realDeathByRound[r]=realDeath;
    }
    for(const p of players){
      const pTeam=p.team_id?.toLowerCase();
      const byType={1:{win:0,loss:0,exit:0,save:0},2:{win:0,loss:0,exit:0,save:0},3:{win:0,loss:0,exit:0,save:0},4:{win:0,loss:0,exit:0,save:0},5:{win:0,loss:0,exit:0,save:0}};
      const clutchRounds=[]; // [{round, type, outcome}, ...] for the debug panel
      for(let r=0;r<m.rounds.length;r++){
        const roundData=m.rounds[r];
        const roundKills=killsByRound[r]||[];
        const plantMs=roundData.plant?.round_time_in_ms??null;
        const defuseMs=roundData.defuse?.round_time_in_ms??null;
        // Attack/defense for this round, from who planted — only known when a
        // plant actually happened; stays null otherwise (round timed out or
        // was decided by elimination with no plant, which could be either side).
        const planterTeam=roundData.plant?.player?.team?.toLowerCase()??null;
        const side=planterTeam?(planterTeam===pTeam?'attack':'defense'):null;
        let myAlive=5,enemyAlive=5,meAlive=true,clutchType=null,clutchStartMs=null,killsAfterClutch=0,deathMs=null;
        let enemyAliveAfterLastKill=null,killTimes=[];
        const realDeath=realDeathByRound[r]||{};
        for(const k of roundKills){
          const victimPuuid=k.victim?.puuid;
          const killMs=k.time_in_round_in_ms??0;
          // Only treat this as an actual elimination for alive-count purposes
          // if it's this player's real, final death this round (see the
          // pre-pass above) — skips both resurrection "deaths" and duplicate
          // log entries. Kill crediting below still processes regardless —
          // dealing the blow is a real kill even if the victim later revives.
          const isRealDeath=victimPuuid&&realDeath[victimPuuid]===killMs;
          if(isRealDeath){
            const victimTeam=k.victim?.team?.toLowerCase();
            if(victimTeam===pTeam)myAlive--;else if(victimTeam)enemyAlive--;
            // Fix 1: check whether THIS kill is the tracked player's own
            // death BEFORE checking whether they just became the last one
            // alive. Their own death can itself be the event that drops
            // myAlive to 1 (a teammate is still alive after them) — that
            // must never be read as "I'm the last one standing," since the
            // opposite is true: I'm the one who died, and whoever's left is
            // the real clutch player.
            if(victimPuuid===p.puuid){meAlive=false;deathMs=killMs;break;}
            if(meAlive&&myAlive===1&&clutchType==null){clutchType=enemyAlive;clutchStartMs=killMs;}
          }
          // Exclude self-inflicted deaths (killer.puuid===victim.puuid — e.g.
          // dying to the spike detonation itself) from counting as a "kill";
          // those are the player's own death, not value they created.
          if(clutchType!=null&&k.killer?.puuid===p.puuid&&k.killer.puuid!==victimPuuid){
            killsAfterClutch++;enemyAliveAfterLastKill=enemyAlive;killTimes.push(killMs);
          }
        }
        if(clutchType!=null&&clutchType>=1&&clutchType<=5){
          const won=roundData.winning_team?.toLowerCase()===pTeam;
          let outcome;
          if(won){
            outcome='win';
          }else if(killsAfterClutch===0){
            // No kill at all — unambiguous regardless of timing. Died with
            // nothing to show for it is just a loss (however fast or slow);
            // survived the whole round without ever firing a shot is a save.
            // Save applies the same way regardless of side or plant status —
            // weapon carryover (keeping your gun next round instead of
            // getting reset to a Classic) only depends on whether you
            // personally survived, not on the specific credit-tier formula
            // Riot applies at a team level. An attacker who survives after a
            // teammate's plant gets defused actually nets MORE credits than
            // the "no plant at all" case (full loss bonus vs the reduced
            // rate) while keeping their gun just the same — so gating this
            // on plant status would've called the worse outcome a "save"
            // and the better one not, which doesn't hold up.
            outcome=deathMs==null?'save':'loss';
            // No need for the idle-window check below — there's no kill to
            // second-guess the genuineness of, and running it here was the
            // actual bug: a player who died fighting BEFORE the spike was
            // even planted had their (real, pre-plant) death fall outside a
            // window that only starts counting from the plant, making a
            // genuine death look like pure silence and default to "save."
          }else{
            // Got at least one kill. Were they actually engaged through
            // their available window, or silent until it was basically
            // over? Window = from becoming last-alive (or the plant, if
            // that comes later) through to detonation — or the round timer
            // if never planted. When the round actually ended by defuse,
            // its real completion timestamp is used as the window's true
            // end instead of assuming the full spike timer elapsed — a
            // defuse can finish well before the spike would've gone off
            // (confirmed against real data: the flat estimate overshot the
            // true window by 30+ seconds in one case), which silently makes
            // genuinely idle behavior look "mostly engaged" by comparison
            // against an inflated denominator.
            const windowStart=(plantMs!=null)?Math.max(clutchStartMs,plantMs):clutchStartMs;
            const windowEnd=(plantMs!=null)?(defuseMs??(plantMs+SPIKE_TIMER_MS)):ROUND_TIMER_MS;
            const windowDuration=windowEnd-windowStart;
            const killsInWindow=killTimes.filter(t=>t>=windowStart&&t<=windowEnd);
            const deathInWindow=(deathMs!=null&&deathMs>=windowStart&&deathMs<=windowEnd)?deathMs:null;
            const actionTimes=[...killsInWindow,...(deathInWindow!=null?[deathInWindow]:[])];
            const firstActionMs=actionTimes.length?Math.min(...actionTimes):windowEnd;
            const idleMs=Math.max(0,firstActionMs-windowStart);
            const idleRatio=windowDuration>0?idleMs/windowDuration:0;
            if(idleRatio>=IDLE_RATIO_THRESHOLD){
              // Sat out most of their window — a late kill doesn't
              // retroactively make that a real attempt.
              outcome='exit';
            }else if(deathMs==null){
              // Actively engaged, survived without dying. A full wipe (no
              // enemies left after their last kill) is never an exit — it's
              // the most complete attempt possible, whatever ended the round
              // afterward (e.g. a spike they couldn't reach in time).
              // Otherwise, they got some value but the round ended with them
              // never having died — read as exit.
              outcome=enemyAliveAfterLastKill>0?'exit':'loss';
            }else{
              // Actively engaged (passed the idle check above), got a kill,
              // then died. This is what a genuine attempt usually looks
              // like — real examples exposed the previous "enough time +
              // enemies still left" check flagging clearly genuine attempts
              // as exit just because the raw clock/headcount happened to
              // look comfortable (e.g. two kills 407ms apart, then dying to
              // the last two enemies 6 seconds later — about as real an
              // attempt as it gets, yet that check called it exit). Blatant
              // exits are rare in practice; being actively engaged and then
              // losing the fight is what a genuine attempt looks like most
              // of the time, regardless of the surrounding clock/headcount.
              outcome='loss';
            }
          }
          // Exit is dropped specifically on attack for now — real-data checks
          // across 277 attack-side clutch situations (4 different players,
          // multiple ranks) found it firing on just 7 of them, and manually
          // tracing every single one showed genuine, continuous engagement
          // (fighting to stop a plant/defuse) in every case, not a deliberate
          // "didn't try" pattern. With zero validated examples of a real
          // attack-side Exit to calibrate against, defaulting those to Loss
          // is the safer call than keeping an unvalidated classification.
          // Defense keeps Exit as-is — that side has confirmed real examples.
          if(outcome==='exit'&&side==='attack')outcome='loss';
          byType[clutchType][outcome]++;
          clutchRounds.push({round:r,type:clutchType,outcome});
        }
      }
      if(Object.values(byType).some(t=>t.win||t.loss||t.exit||t.save))clutchAllByPuuid.set(p.puuid,byType);
      if(clutchRounds.length)clutchRoundsByPuuid.set(p.puuid,clutchRounds);
    }
  }

  let won=undefined, myR=undefined, opR=undefined;

  const teamsRaw=m.teams;
  if(Array.isArray(teamsRaw)){
    const myT=teamsRaw.find(t=>t.team_id?.toLowerCase()===myTeamId);
    const opT=teamsRaw.find(t=>t.team_id?.toLowerCase()!==myTeamId);
    myR=myT?.rounds?.won??myT?.rounds_won;
    opR=opT?.rounds?.won??opT?.rounds_won;
  } else if(teamsRaw&&typeof teamsRaw==='object'){
    const myT=myTeamId?teamsRaw[myTeamId]:null;
    const opTeamId=myTeamId==='red'?'blue':'red';
    const opT=teamsRaw[opTeamId]||null;
    if(typeof myT==='number'){
      myR=myT;
      opR=typeof opT==='number'?opT:null;
    } else if(myT&&typeof myT==='object'){
      myR=myT.rounds_won??myT.rounds?.won;
      opR=opT?.rounds_won??opT?.rounds?.won;
    }
  }

  // Always derive won from round counts — API's won field is unreliable for draws
  if(myR!=null&&opR!=null){
    if(myR>opR) won=true;
    else if(myR<opR) won=false;
    else won=undefined; // genuine draw (14-14, 15-15 overtime tie)
  }
  const mapName=meta.map?.name||meta.map||'Unknown';
  const durationMs=meta.game_length_in_ms??(meta.game_length!=null?meta.game_length*1000:null);
  const startedAtDate=meta.started_at
    ?new Date(meta.started_at)
    :meta.game_start
      ?new Date(meta.game_start*1000)
      :null;
  const startedAtMs=startedAtDate?startedAtDate.getTime():null;
  const startedAt=startedAtDate
    ?startedAtDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
    :'';

  // Avg lobby rank — averaged over rated players only (Iron 1 = tier 3+).
  // Strict quality gate: if fewer than MIN_RATED of the lobby are rated, too much
  // of the lobby is unranked to trust the average, so drop it.
  const rankNums=players.map(p=>p.tier?.id??p.currenttier??0).filter(n=>n>=3);
  const ratedCount=rankNums.length;
  const rawAvg=ratedCount?rankNums.reduce((a,b)=>a+b,0)/ratedCount:null;
  const avgRank=ratedCount>=MIN_RATED?rawAvg:null;
  // A lobby with ZERO rated players (everyone Unranked — common right after a
  // reset) has rawAvg===null, which previously made this whole condition
  // false via the `rawAvg!=null&&` guard — incorrectly treating a fully
  // unranked lobby as if it wasn't low-rated at all, instead of flagging it
  // as unrated like every other under-MIN_RATED lobby.
  const lowRated=ratedCount<MIN_RATED;

  // Total rounds in the match — same for all players, use as fallback for rounds_played
  const totalRounds=(myR!=null&&opR!=null)?myR+opR:null;

  // My stats — v4 player object fields
  const myStats=me?extractStats(me,totalRounds):null;

  // All players with tier + ACS
  const playersOut=players.map(p=>{
    const s=p.stats||p;
    const score=s.score??s.combat_score??0;
    const rp=s.rounds_played??s.roundsPlayed??totalRounds;
    const _acs=rp&&rp>0?score/rp:null;
    const _kills=s.kills??0;
    const _deaths=s.deaths??0;
    // KD: null means unknown (no data), not 0
    const _kd=_deaths>0?Math.round((_kills/_deaths)*100)/100:_kills>0?_kills:null;
    return{
      name:p.name,tag:p.tag,puuid:p.puuid,
      team_id:p.team_id?.toLowerCase(),
      party_id:p.party_id??null,
      _tier:p.tier?.id??p.currenttier??0,
      _label:p.tier?.patched??p.currenttier_patched??rName(p.tier?.id??p.currenttier??0),
      _kills,
      _deaths,
      _kd,
      _acs,
      _clutchAll:clutchAllByPuuid.get(p.puuid)||null,
      _clutchRounds:clutchRoundsByPuuid.get(p.puuid)||null,
    };
  });

  // MVP: highest ACS in the match; team MVP: highest ACS per team
  const acsPlayers=playersOut.filter(p=>p._acs!=null);
  const matchMvpPuuid=acsPlayers.length?acsPlayers.reduce((a,b)=>b._acs>a._acs?b:a).puuid:null;
  const teams=[...new Set(playersOut.map(p=>p.team_id))];
  const teamMvpPuuids=new Set(teams.map(tid=>{
    const tp=acsPlayers.filter(p=>p.team_id===tid);
    return tp.length?tp.reduce((a,b)=>b._acs>a._acs?b:a).puuid:null;
  }).filter(Boolean));

  // ACS placement within the match (1 = highest ACS), assigned once here so
  // render-time code (K/D-by-rank buckets, the teammates list) can read it
  // directly instead of re-sorting every match's players on every re-render.
  // acsPlayers holds references into playersOut, so this mutates those objects.
  [...acsPlayers].sort((a,b)=>b._acs-a._acs).forEach((p,i)=>{p._acsPlace=i+1;});
  const mePlayerOut=playersOut.find(p=>PUUID?p.puuid===PUUID:
    `${p.name}#${p.tag}`.toLowerCase()===`${PLAYER}#${TAG}`.toLowerCase());
  const myAcsPlace=mePlayerOut?._acsPlace??null;
  const myClutchAll=mePlayerOut?._clutchAll??null; // {1:{win,loss,exit,save},...,5:{...}} or null
  const myClutchRounds=mePlayerOut?._clutchRounds??[]; // [{round,type,outcome},...] for the debug panel
  const matchId=meta.match_id??m.match_id??null;

  // Party size — count teammates sharing the same party_id as me
  const myPartyId=me?.party_id??null;
  const myTeamPlayers=players.filter(p=>p.team_id?.toLowerCase()===myTeamId);
  const partySize=myPartyId
    ? myTeamPlayers.filter(p=>p.party_id===myPartyId).length
    : 1;

  // My tier and RR for this match — used to derive peak rank
  const myTierId=me?.tier?.id??me?.currenttier??0;
  const myTierName=me?.tier?.patched??me?.currenttier_patched??rName(myTierId);
  // v4 match player object uses `rr`; v3 used `ranking_in_tier` — check both
  const myRR=null; // v4 match endpoint doesn't include per-match RR — fetched separately via mmr-history
  return{mapName,startedAt,startedAtMs,durationMs,won,myR,opR,avgRank,avgRankRaw:rawAvg,lowRated,ratedCount,myStats,players:playersOut,myTierId,myTierName,myRR,partySize,myPartyId,myAcsPlace,matchMvpPuuid,teamMvpPuuids,myClutchAll,myClutchRounds,matchId,seasonShort:meta.season?.short??null,seasonId:meta.season?.id??null};
}

function extractStats(p,fallbackRounds=null){
  // v4 stats nested under p.stats, v3 flat
  const s=p.stats||p;
  // Use null as sentinel so we can detect missing data vs a genuine 0
  const kills=s.kills??null;
  const deaths=s.deaths??null;
  // If both kills and deaths are absent, we have no real stats — signal the caller
  if(kills===null&&deaths===null)return null;
  const k=kills??0;
  const d=deaths??0;
  const assists=s.assists??0;
  const score=s.score??s.combat_score??0;
  const rounds_played=s.rounds_played??s.roundsPlayed??fallbackRounds;
  const dmg=p.damage_made??s.damage?.made??s.damage_made??null;
  const hs=p.headshots??s.headshots??s.shots?.head??null;
  const bs=p.bodyshots??s.bodyshots??s.shots?.body??null;
  const ls=p.legshots??s.legshots??s.shots?.leg??null;
  const totalShots=(hs??0)+(bs??0)+(ls??0);
  const hsPct=totalShots>0?Math.round((hs??0)/totalShots*100):null;

  // ACS = combat score / rounds; if no rounds_played we can't compute it
  const acs=rounds_played&&rounds_played>0?score/rounds_played:null;
  // KD: null means unknown (no data), not 0
  const kd=d>0?Math.round((k/d)*100)/100:k>0?k:null;
  const adr=rounds_played&&rounds_played>0&&dmg!==null?Math.round(dmg/rounds_played):null;

  return{kills:k,deaths:d,assists,score,rounds_played:rounds_played??null,kd,acs,adr,hsPct,dmg};
}
