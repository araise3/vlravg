/* ── API ─────────────────────────────────────────────────── */
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function fetchWithRetry(url,_attempt=0){
  const MAX_RETRIES=4;
  const RETRYABLE=[429,500,502,503,504,0]; // 0 = network error (CORS on 5xx, offline)
  try{
    const r=await fetch(url);
    if(r.status===429){
      const wait=Math.max(parseInt(r.headers.get('retry-after')||'5'),5)*1000;
      setStatus(`Rate limited — waiting ${Math.ceil(wait/1000)}s…`,true);
      await sleep(wait);
      return fetchWithRetry(url,_attempt);
    }
    if(RETRYABLE.includes(r.status)){
      if(_attempt>=MAX_RETRIES)throw new Error(`API ${r.status}: server error after ${MAX_RETRIES} retries`);
      const wait=Math.min(1000*Math.pow(2,_attempt),16000); // 1s,2s,4s,8s,16s
      setStatus(`Server error (${r.status}) — retrying in ${Math.ceil(wait/1000)}s… (${_attempt+1}/${MAX_RETRIES})`,true);
      await sleep(wait);
      return fetchWithRetry(url,_attempt+1);
    }
    if(!r.ok)throw new Error(`API ${r.status}: ${(await r.text()).slice(0,200)}`);
    const j=await r.json();
    const rem=r.headers.get('x-ratelimit-remaining');
    return{j,rem:rem!=null?parseInt(rem):null};
  }catch(e){
    // NetworkError = fetch() itself threw (e.g. CORS blocked on a 504 with no headers)
    if(e.name==='TypeError'||e.message?.includes('NetworkError')||e.message?.includes('fetch')){
      if(_attempt>=MAX_RETRIES)throw new Error(`Network error after ${MAX_RETRIES} retries — check your connection`);
      const wait=Math.min(1500*Math.pow(2,_attempt),20000);
      setStatus(`Network error — retrying in ${Math.ceil(wait/1000)}s… (${_attempt+1}/${MAX_RETRIES})`,true);
      await sleep(wait);
      return fetchWithRetry(url,_attempt+1);
    }
    throw e; // non-retryable error, bubble up
  }
}

function isSeason(m){
  if(!TARGET_SEASON)return true;
  const sid=m.metadata?.season?.id||m.metadata?.season_id||'';
  return sid===TARGET_SEASON||sid.includes(TARGET_SEASON.slice(0,8));
}
/* ── PROCESS MATCH ──────────────────────────────────────── */
function processMatch(m){
  const meta=m.metadata||{};
  const players=m.players||[];

  // Prefer PUUID lookup (works across name changes); fall back to name+tag
  const me=players.find(p=>PUUID?p.puuid===PUUID:
    p.name?.toLowerCase().trim()===PLAYER.toLowerCase().trim()&&p.tag?.toLowerCase().trim()===TAG.toLowerCase().trim()
  );
  const myTeamId=me?.team_id?.toLowerCase();

  let won=undefined, myR=undefined, opR=undefined;

  const teamsRaw=m.teams;
  if(Array.isArray(teamsRaw)){
    const myT=teamsRaw.find(t=>t.team_id?.toLowerCase()===myTeamId);
    const opT=teamsRaw.find(t=>t.team_id?.toLowerCase()!==myTeamId);
    myR=myT?.rounds?.won??myT?.rounds_won;
    opR=opT?.rounds?.won??opT?.rounds_won;
  } else if(teamsRaw&&typeof teamsRaw==='object'){
    const myT=myTeamId?teamsRaw[myTeamId]:null;
    const opTeamId=myTeamId==='red'?'blue':'red';
    const opT=teamsRaw[opTeamId]||null;
    if(typeof myT==='number'){
      myR=myT;
      opR=typeof opT==='number'?opT:null;
    } else if(myT&&typeof myT==='object'){
      myR=myT.rounds_won??myT.rounds?.won;
      opR=opT?.rounds_won??opT?.rounds?.won;
    }
  }

  // Always derive won from round counts — API's won field is unreliable for draws
  if(myR!=null&&opR!=null){
    if(myR>opR) won=true;
    else if(myR<opR) won=false;
    else won=undefined; // genuine draw (14-14, 15-15 overtime tie)
  }
  const mapName=meta.map?.name||meta.map||'Unknown';
  const durationMs=meta.game_length_in_ms??(meta.game_length!=null?meta.game_length*1000:null);
  const startedAtDate=meta.started_at
    ?new Date(meta.started_at)
    :meta.game_start
      ?new Date(meta.game_start*1000)
      :null;
  const startedAtMs=startedAtDate?startedAtDate.getTime():null;
  const startedAt=startedAtDate
    ?startedAtDate.toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
    :'';

  // Avg lobby rank
  const rankNums=players.map(p=>p.tier?.id??p.currenttier??0).filter(n=>n>=3);
  const avgRank=rankNums.length?rankNums.reduce((a,b)=>a+b,0)/rankNums.length:null;

  // Total rounds in the match — same for all players, use as fallback for rounds_played
  const totalRounds=(myR!=null&&opR!=null)?myR+opR:null;

  // My stats — v4 player object fields
  const myStats=me?extractStats(me,totalRounds):null;

  // All players with tier + ACS
  const playersOut=players.map(p=>{
    const s=p.stats||p;
    const score=s.score??s.combat_score??0;
    const rp=s.rounds_played??s.roundsPlayed??totalRounds;
    const _acs=rp&&rp>0?score/rp:null;
    return{
      name:p.name,tag:p.tag,puuid:p.puuid,
      team_id:p.team_id?.toLowerCase(),
      party_id:p.party_id??null,
      _tier:p.tier?.id??p.currenttier??0,
      _label:p.tier?.patched??p.currenttier_patched??rName(p.tier?.id??p.currenttier??0),
      _kills:p.stats?.kills??0,
      _deaths:p.stats?.deaths??0,
      _acs,
    };
  });

  // MVP: highest ACS in the match; team MVP: highest ACS per team
  const acsPlayers=playersOut.filter(p=>p._acs!=null);
  const matchMvpPuuid=acsPlayers.length?acsPlayers.reduce((a,b)=>b._acs>a._acs?b:a).puuid:null;
  const teams=[...new Set(playersOut.map(p=>p.team_id))];
  const teamMvpPuuids=new Set(teams.map(tid=>{
    const tp=acsPlayers.filter(p=>p.team_id===tid);
    return tp.length?tp.reduce((a,b)=>b._acs>a._acs?b:a).puuid:null;
  }).filter(Boolean));

  // Party size — count teammates sharing the same party_id as me
  const myPartyId=me?.party_id??null;
  const myTeamPlayers=players.filter(p=>p.team_id?.toLowerCase()===myTeamId);
  const partySize=myPartyId
    ? myTeamPlayers.filter(p=>p.party_id===myPartyId).length
    : 1;

  // My tier and RR for this match — used to derive peak rank
  const myTierId=me?.tier?.id??me?.currenttier??0;
  const myTierName=me?.tier?.patched??me?.currenttier_patched??rName(myTierId);
  // v4 match player object uses `rr`; v3 used `ranking_in_tier` — check both
  const myRR=null; // v4 match endpoint doesn't include per-match RR — fetched separately via mmr-history
  return{mapName,startedAt,startedAtMs,durationMs,won,myR,opR,avgRank,myStats,players:playersOut,myTierId,myTierName,myRR,partySize,myPartyId,matchMvpPuuid,teamMvpPuuids};
}

function extractStats(p,fallbackRounds=null){
  // v4 stats nested under p.stats, v3 flat
  const s=p.stats||p;
  // Use null as sentinel so we can detect missing data vs a genuine 0
  const kills=s.kills??null;
  const deaths=s.deaths??null;
  // If both kills and deaths are absent, we have no real stats — signal the caller
  if(kills===null&&deaths===null)return null;
  const k=kills??0;
  const d=deaths??0;
  const assists=s.assists??0;
  const score=s.score??s.combat_score??0;
  const rounds_played=s.rounds_played??s.roundsPlayed??fallbackRounds;
  const dmg=p.damage_made??s.damage?.made??s.damage_made??null;
  const hs=p.headshots??s.headshots??s.shots?.head??null;
  const bs=p.bodyshots??s.bodyshots??s.shots?.body??null;
  const ls=p.legshots??s.legshots??s.shots?.leg??null;
  const totalShots=(hs??0)+(bs??0)+(ls??0);
  const hsPct=totalShots>0?Math.round((hs??0)/totalShots*100):null;

  // ACS = combat score / rounds; if no rounds_played we can't compute it
  const acs=rounds_played&&rounds_played>0?score/rounds_played:null;
  // KD: null means unknown (no data), not 0
  const kd=d>0?Math.round((k/d)*100)/100:k>0?k:null;
  const adr=rounds_played&&rounds_played>0&&dmg!==null?Math.round(dmg/rounds_played):null;

  return{kills:k,deaths:d,assists,score,rounds_played:rounds_played??null,kd,acs,adr,hsPct,dmg};
}

/* ── LOAD ─────────────────────────────────────────────────── */
async function loadAll(prefetchSnapshot=null){
  setProgress(3);
  try{
    // Step 0: resolve PUUID so we can find the player in historical matches
    // regardless of name changes over time
    setStatus('Resolving player…',true);
    try{
      let acctJ;
      if(prefetchSnapshot?.acctJ){
        acctJ=prefetchSnapshot.acctJ;
      }else{
        const acctUrl=`${API_BASE}/valorant/v1/account/${encodeURIComponent(PLAYER)}/${TAG}`;
        ({j:acctJ}=await fetchWithRetry(acctUrl));
      }
      const acctData=acctJ.data||acctJ;
      PUUID=acctData.puuid||'';
      // Use API-returned name/tag for correct capitalisation
      if(acctData.name) PLAYER=acctData.name;
      if(acctData.tag)  TAG=acctData.tag;
      if(acctData.region){
        REGION=acctData.region.toLowerCase();
      }
    }catch(_){
      // If account lookup fails, fall back to name+tag matching
    }
    // Autocorrect the input's casing now that it's resolved (corrected casing
    // on success, the originally-typed value stays as a fallback on failure).
    {
      const inputEl=document.getElementById('m-nametag');
      if(inputEl)inputEl.value=`${PLAYER}#${TAG}`;
    }

    // Step 1: fetch v3/mmr (or reuse the prefetch) — used for dropdown update, auto-select, and offset calculation
    let targetCount=null;
    let start=0;
    let finalCurrent=null;
    let finalSeasonLabel=null;
    setStatus('Fetching season history…',true);
    try{
      let mmrJ;
      if(prefetchSnapshot?.mmrJ){
        mmrJ=prefetchSnapshot.mmrJ;
      }else{
        const mmrUrl=`${API_BASE}/valorant/v3/mmr/${REGION}/${PLATFORM}/${encodeURIComponent(PLAYER)}/${TAG}`;
        ({j:mmrJ}=await fetchWithRetry(mmrUrl));
      }
      const seasonal=(mmrJ.data||mmrJ).seasonal||[];
      const seasonOrder=getSeasonOrder(seasonal);
      finalCurrent=(mmrJ.data||mmrJ).current||null;

      // Build UUID-keyed stats map for dropdown
      const seasonStats={};
      seasonal.forEach(s=>{
        const id=(s.season?.id||'').toLowerCase();
        if(!id)return;
        seasonStats[id]={peakRank:s.peak_rank?.patched||null,games:s.games||0,short:s.season?.short||null};
      });

      // Repopulate dropdown: only acts the player has played, with peak rank badge
      if(Object.keys(seasonStats).length)updateSeasonDropdown(seasonStats,seasonOrder);

      // Auto-select most recent played act if no season was explicitly chosen
      if(!TARGET_SEASON){
        let picked=false;
        for(let i=seasonOrder.length-1;i>=0;i--){
          const uuid=seasonOrder[i];
          if(seasonStats[uuid.toLowerCase()]?.games>0){
            TARGET_SEASON=uuid;
            const sel=document.getElementById('m-season');
            sel.value=uuid;
            updateSeasonTriggerLabel();
            finalSeasonLabel=sel.selectedOptions[0]?.text||getActLabel(uuid,seasonStats[uuid.toLowerCase()]?.short);
            picked=true;
            break;
          }
        }
        // Genuinely nothing to default to (player has 0 games in every act we
        // know about) — show literal "All" instead of a "Most recent" guess.
        if(!picked)finalSeasonLabel='All';
      }else{
        finalSeasonLabel=getSeasonPreviewLabel();
      }

      // Compute game count + skip offset for the target season
      if(TARGET_SEASON){
        const actEntry=seasonal.find(s=>s.season?.id===TARGET_SEASON);
        if(actEntry?.games){
          targetCount=actEntry.games;
          const targetIdx=seasonOrder.indexOf(TARGET_SEASON);
          const skipGames=seasonal
            .filter(s=>seasonOrder.indexOf(s.season?.id)>targetIdx)
            .reduce((sum,s)=>sum+(s.games||0),0);
          start=Math.max(0,skipGames-20);
          console.log(`[mmr] targetCount=${targetCount} skipGames=${skipGames} startOffset=${start}`);
          setStatus(`Act has ${targetCount} games — jumping to offset ${start}…`,true);
        }
      }
    }catch(_){
      // MMR fetch failed — proceed from offset 0 with no optimisation. We also
      // can't auto-pick an act now, so it's genuinely "All" unless the player
      // explicitly chose a season before hitting Search.
      finalSeasonLabel=TARGET_SEASON?getSeasonPreviewLabel():'All';
    }
    // Reveal rank, season, and region together — nothing pops in separately.
    finalizeHeader(finalCurrent,finalSeasonLabel||getSeasonPreviewLabel());

    // Kick off act-start-date lookup in parallel with match pagination below —
    // it's only needed later, by renderPlaytime(), so no need to block on it here.
    const actStartPromise=fetchActStartMs(TARGET_SEASON);

    // Step 2: paginate match history, stopping when we hit targetCount
    let collected=[];

    while(true){
      // Update status and progress bar together from the same value so they stay in sync
      const pct=targetCount?Math.round(collected.length/targetCount*100):null;
      setStatus(`Fetching matches ${start+1}–${start+BATCH} · ${collected.length}${targetCount?'/'+targetCount:''} found${pct?' ('+pct+'%)':''}…`,true);
      setProgress(targetCount
        ?Math.min(5+collected.length/targetCount*90,95)
        :Math.min(10+start/4,85));

      const url=`${API_BASE}/valorant/v4/matches/${REGION}/${PLATFORM}/${encodeURIComponent(PLAYER)}/${TAG}?mode=competitive&size=${BATCH}&start=${start}`;
      const{j,rem}=await fetchWithRetry(url);
      const data=j.data||[];
      if(!data.length)break;

      const onPage=TARGET_SEASON?data.filter(m=>isSeason(m)):data;
      onPage.forEach(m=>collected.push(m));

      // End of history
      if(data.length<BATCH)break;
      // Scrolled past the season — full batch with zero matching games
      if(TARGET_SEASON&&collected.length>0&&onPage.length===0)break;

      start+=BATCH;
      const delay=rem!==null&&rem<=2?3000:DELAY_MS;
      await sleep(delay);
    }

    // Deduplicate by match_id
    const seen=new Set();
    const deduped=collected.filter(m=>{
      const id=m.metadata?.match_id||m.match_id||'';
      if(!id||seen.has(id))return false;
      seen.add(id);return true;
    });
    allMatches=deduped.map(processMatch);
    setProgress(100);
    setTimeout(()=>setProgress(0),600);
    actStartMs=await actStartPromise;
    renderAll();
  }catch(e){
    setStatus('');
    document.getElementById('error-container').innerHTML=
      `<div class="error-box">Error: ${e.message}<br><br>Check browser console (F12) for details.</div>`;
  }
}

/* ── RENDER ALL ──────────────────────────────────────────── */
// Renders `rows` (an array of built elements) into `containerEl` in pages of
// `pageSize`, with click-through dot indicators in `dotsEl` when there's
// more than one page. Used by the party-size, player-rank, and lobby-rank breakdowns.
// Builds/updates the pagination dots for a list, animating dots in and out
// when the number of pages changes (e.g. toggling K/D modes). If the count is
// unchanged it just updates which dot is active (no re-animation).
function syncDots(dotsEl,count,activeIdx,onClick){
  dotsEl.style.display='flex';
  const live=[...dotsEl.querySelectorAll('.pb-dot:not(.dot-removing)')];
  if(live.length===count){
    live.forEach((d,i)=>d.classList.toggle('active',i===activeIdx));
    return;
  }
  // Fade/scale out the dots that are going away.
  live.forEach(d=>{
    d.classList.add('dot-removing','dot-hidden');
    setTimeout(()=>d.remove(),260);
  });
  // Add the new set, entering from hidden on the next frame.
  const created=[];
  for(let i=0;i<count;i++){
    const dot=document.createElement('button');
    dot.type='button';
    dot.className='pb-dot dot-hidden'+(i===activeIdx?' active':'');
    dot.setAttribute('aria-label','Page '+(i+1));
    const idx=i;
    dot.addEventListener('click',()=>onClick(idx));
    dotsEl.appendChild(dot);
    created.push(dot);
  }
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    created.forEach(d=>d.classList.remove('dot-hidden'));
  }));
}

function paginateRows(containerEl,dotsEl,rows,pageSize,skipHeightLock,afterRender){
  containerEl.innerHTML='';
  const pageCount=Math.ceil(rows.length/pageSize);
  if(pageCount<=1){
    rows.forEach(r=>containerEl.appendChild(r));
    // Keep the row in layout (dots animate out) rather than display:none, so
    // the bottom of the card doesn't shrink when switching to a single page.
    syncDots(dotsEl,0,0,()=>{});
    if(afterRender)afterRender();
    return;
  }
  let currentIdx=0;
  function renderPage(idx,animate){
    if(!animate){
      containerEl.innerHTML='';
      rows.slice(idx*pageSize,idx*pageSize+pageSize).forEach(r=>containerEl.appendChild(r));
      [...dotsEl.querySelectorAll('.pb-dot:not(.dot-removing)')].forEach((d,i)=>d.classList.toggle('active',i===idx));
      currentIdx=idx;
      if(afterRender)afterRender();
      return;
    }
    if(idx===currentIdx)return;
    const dir=idx>currentIdx?1:-1;
    currentIdx=idx;
    [...dotsEl.querySelectorAll('.pb-dot:not(.dot-removing)')].forEach((d,i)=>d.classList.toggle('active',i===idx));
    containerEl.style.transition='opacity .15s ease,transform .15s ease';
    containerEl.style.opacity='0';
    containerEl.style.transform=`translateX(${dir*-14}px)`;
    setTimeout(()=>{
      containerEl.innerHTML='';
      rows.slice(idx*pageSize,idx*pageSize+pageSize).forEach(r=>containerEl.appendChild(r));
      if(afterRender)afterRender();
      containerEl.style.transition='none';
      containerEl.style.transform=`translateX(${dir*14}px)`;
      void containerEl.offsetWidth; // force reflow so the next transition runs
      containerEl.style.transition='opacity .22s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1)';
      containerEl.style.opacity='1';
      containerEl.style.transform='translateX(0)';
    },150);
  }
  syncDots(dotsEl,pageCount,0,(i)=>renderPage(i,true));
  containerEl.style.minHeight='';
  if(!skipHeightLock)containerEl.style.overflow='hidden';
  renderPage(0,false);
  // Lock the box to the height of its fullest page so switching to a page
  // with fewer rows doesn't shrink the card. Deferred to the next frame
  // because the card/container may still be display:none right now (its
  // visibility gets turned on by the caller right after this returns),
  // which would make offsetHeight read as 0.
  if(!skipHeightLock){
    requestAnimationFrame(()=>{
      containerEl.style.minHeight=containerEl.offsetHeight+'px';
    });
  }
}

function renderAll(){
  const n=allMatches.length;
  if(!n){setStatus('No matches found for this season.');return;}

  // Avg lobby rank (overall + last 20) only counts solo queue games — party size 1
  const soloMatches=allMatches.filter(m=>(m.partySize||1)===1);
  const avgs=soloMatches.map(m=>m.avgRank).filter(Boolean);
  const overall=avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:null;

  // Theme the whole UI from the average lobby rank (not the player's own rank).
  // Fall back to all matches if the player has no solo-queue games.
  const accentAvg=overall!=null?overall:(()=>{
    const a=allMatches.map(m=>m.avgRank).filter(Boolean);
    return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  })();
  if(accentAvg!=null)setAccent(rColor(Math.round(accentAvg)));

  // Sum raw kills and deaths across all games for an accurate overall K/D
  const statGames=allMatches.filter(m=>m.myStats&&m.myStats.kills!=null&&m.myStats.deaths!=null);
  const totalKills=statGames.reduce((a,m)=>a+m.myStats.kills,0);
  const totalDeaths=statGames.reduce((a,m)=>a+m.myStats.deaths,0);
  const avgKD=statGames.length?(totalDeaths>0?+(totalKills/totalDeaths).toFixed(2):totalKills):null;

  const wins=allMatches.filter(m=>m.won===true).length;
  const wr=n?Math.round(wins/n*100):0;
  const wrColor=wr>=50?'#22c55e':'#ef4444';
  document.getElementById('sg-games').textContent=n;
  document.getElementById('sg-wr').innerHTML=`<span style="color:${wrColor}">${wr}%</span>`;
  const avgRankTier=overall!=null?Math.round(overall):null;
  document.getElementById('sg-avg-rank').innerHTML=(avgRankTier!=null?rankIcon(avgRankTier,40)+' ':'')+(overall!=null?`<span>${avgLabel(overall)}<span class="s-value-suffix"> (${overall.toFixed(1)})</span></span>`:avgLabel(overall));
  // Last 20 games avg rank
  const last20=avgs.slice(-20);
  const recent20=last20.length?last20.reduce((a,b)=>a+b,0)/last20.length:null;
  document.getElementById('sg-avg-rank-sub').innerHTML=recent20!=null
    ?`<span class="hero-sub"><span class="hero-sub-lbl">Last 20 solo</span><span class="hero-sub-val">${avgLabel(recent20)} (${recent20.toFixed(1)})</span></span>`
    :'&nbsp;';

  // Rank breakdown — per sub-rank (Asc 1, Asc 2, Imm 1 etc.)
  // Using global RANK_COLORS
  function renderRankBreakdown(matches,containerId,getTier){
    const rankCounts={};
    matches.forEach(m=>{
      const raw=getTier(m);
      if(raw==null)return;
      const t=Math.round(raw);
      rankCounts[t]=(rankCounts[t]||0)+1;
    });
    const breakdown=document.getElementById(containerId);
    breakdown.innerHTML='';
    // Show in descending order (highest rank first)
    Object.keys(rankCounts).map(Number).sort((a,b)=>b-a).forEach(t=>{
      const count=rankCounts[t];
      if(!count||t<3)return;
      const item=document.createElement('div');
      item.className='rb-item';
      item.innerHTML=`${rankIcon(t,14)}<span style="color:${rColor(t)}">${RANK_MAP_SHORT[t]||t}</span><span class="rb-count">${count}</span>`;
      breakdown.appendChild(item);
    });
  }
  renderRankBreakdown(soloMatches,'sg-rank-breakdown-solo',m=>m.avgRank);
  document.getElementById('sg-kd').textContent=avgKD!=null?avgKD.toFixed(2):'—';

  // Avg ACS — total combat score ÷ total rounds (weighted, matches tracker.gg)
  const acsGames=allMatches.filter(m=>m.myStats?.acs!=null&&m.myStats?.rounds_played>0);
  const totalAcsScore=acsGames.reduce((a,m)=>a+m.myStats.score,0);
  const totalAcsRounds=acsGames.reduce((a,m)=>a+m.myStats.rounds_played,0);
  const avgAcs=totalAcsRounds>0?Math.round(totalAcsScore/totalAcsRounds):null;
  document.getElementById('sg-acs').textContent=avgAcs!=null?avgAcs:'—';

  renderRankByRankCard();

  // Measure longest avg lobby label across all matches and fix m-badge width
  const _badgeCanvas=document.createElement('canvas');
  const _badgeCtx=_badgeCanvas.getContext('2d');
  _badgeCtx.font='700 13px Geist,system-ui,sans-serif';
  const _maxBadgeW=allMatches.reduce((max,m)=>{
    if(m.avgRank==null)return max;
    const lbl=`${avgLabelShort(m.avgRank)} (${m.avgRank.toFixed(1)})`;
    return Math.max(max,_badgeCtx.measureText(lbl).width);
  },0);
  const _badgeW=Math.ceil(_maxBadgeW)+16;
  document.documentElement.style.setProperty('--match-badge-w',_badgeW+'px');

  document.getElementById('summary-grid').style.display='flex';
  renderPlaytime();
  document.getElementById('show-history-btn').style.display='block';
  buildTeammates();
  layoutTopRow();
  requestAnimationFrame(()=>requestAnimationFrame(matchRankRowHeights));

  // Populate rank filter buttons based on what ranks actually appear in the data
  const RANK_GROUP_DEFS=[
    {label:'Iron',  tiers:[3,4,5], color:rColor(3)},
    {label:'Bronze',tiers:[6,7,8], color:rColor(6)},
    {label:'Silver',tiers:[9,10,11],color:rColor(9)},
    {label:'Gold',  tiers:[12,13,14],color:rColor(12)},
    {label:'Plat',  tiers:[15,16,17],color:rColor(15)},
    {label:'Diamond',tiers:[18,19,20],color:rColor(18)},
    {label:'Asc',   tiers:[21,22,23],color:rColor(21)},
    {label:'Imm',   tiers:[24,25,26],color:rColor(24)},
    {label:'Radiant',tiers:[27],    color:rColor(27)},
  ];
  const rankGroup=document.getElementById('rank-filter-group');
  // keep the label, remove old buttons
  rankGroup.querySelectorAll('.filter-btn').forEach(b=>b.remove());
  RANK_GROUP_DEFS.forEach(g=>{
    const hasMatches=allMatches.some(m=>m.avgRank!=null&&g.tiers.includes(Math.round(m.avgRank)));
    if(!hasMatches)return;
    const btn=document.createElement('button');
    btn.className='filter-btn';
    btn.style.cssText=`border-left:3px solid ${g.color};`;
    btn.textContent=g.label;
    btn.onclick=(e)=>setRankFilter(g.label,e);
    rankGroup.appendChild(btn);
  });

  // Populate party size filter buttons
  const partyGroup=document.getElementById('party-filter-group');
  partyGroup.querySelectorAll('.filter-btn').forEach(b=>b.remove());
  const PARTY_LABELS={1:'Solo',2:'Duo',3:'Trio',4:'Quad',5:'5-Stack'};
  const partySizes=[...new Set(allMatches.map(m=>m.partySize||1))].sort((a,b)=>a-b);
  partySizes.forEach(sz=>{
    const btn=document.createElement('button');
    btn.className='filter-btn';
    btn.textContent=PARTY_LABELS[sz]||`${sz}-stack`;
    btn.onclick=(e)=>setPartyFilter(sz,e);
    partyGroup.appendChild(btn);
  });
  setStatus('',false);
  renderMatches();
}

/* ── TEAMMATES ───────────────────────────────────────────── */
// Shows Most Played With / Breakdown side by side when both have data;
// collapses to a single full-width column when only one does, and hides
// the row entirely when neither has anything to show.
// Hard-sets each K/D-by row's height so that a full page of 4 rows (plus the
// 3 gaps between them) occupies exactly the same vertical space as a full page
// of 5 teammate cards (plus their 4 gaps) in the card to the left. Measured
// from a real teammate card so it stays correct regardless of font rendering.
const TM_LIST_GAP=6, PB_LIST_GAP=6, PB_PER_PAGE=4;
function matchRankRowHeights(){
  const tmCard=document.querySelector('#teammate-list .teammate-card');
  const ro=document.getElementById('sg-rank-overview');
  if(!tmCard||!ro)return;
  const tmH=tmCard.getBoundingClientRect().height;
  if(!tmH)return;
  // 5 teammate cards + 4 gaps == 4 pb rows + 3 gaps  →  solve for pb row height
  const targetListH=TM_PER_PAGE*tmH+(TM_PER_PAGE-1)*TM_LIST_GAP;
  const pbRowH=(targetListH-(PB_PER_PAGE-1)*PB_LIST_GAP)/PB_PER_PAGE;
  ro.querySelectorAll('.pb-row').forEach(r=>{r.style.height=pbRowH+'px';});
  // Lock the list itself to the full-page height too. Without this, a page
  // with fewer than 4 rows collapses the container and the pagination dots
  // ride up with it (paginateRows' own minHeight lock can capture a stale,
  // pre-inflation measurement on first render — this overrides it with the
  // correct target every time).
  ro.style.minHeight=targetListH+'px';
}

function layoutTopRow(){
  const row=document.getElementById('top-row');
  const tmVisible=document.getElementById('teammates-section').style.display!=='none';
  const rankVisible=document.getElementById('sg-rank-card').style.display!=='none';
  if(!tmVisible&&!rankVisible){row.style.display='none';return;}
  row.style.display='grid';
  row.style.gridTemplateColumns=(tmVisible&&rankVisible)?'1fr 1fr':'1fr';
}

function buildTeammates(){
  const tmap={};
  allMatches.forEach(m=>{
    if(!m.myStats)return;
    const myTeam=m.players.filter(p=>p.team_id===m.players.find(q=>
      PUUID?q.puuid===PUUID:q.name?.toLowerCase()===PLAYER.toLowerCase()
    )?.team_id);
    myTeam.forEach(p=>{
      if(PUUID?p.puuid===PUUID:p.name?.toLowerCase()===PLAYER.toLowerCase())return;
      // Only count players who were in the same party (duo/trio/5-stack)
      if(!m.myPartyId||p.party_id!==m.myPartyId)return;
      const key=p.puuid||`${p.name}#${p.tag}`;
      if(!tmap[key])tmap[key]={name:p.name,tag:p.tag,key,games:0,wins:0,kills:0,deaths:0,rankSum:0,rankCount:0,acsSum:0,acsCount:0,placeSum:0,placeCount:0};
      tmap[key].games++;
      if(m.won===true)tmap[key].wins++;
      tmap[key].kills+=p._kills||0;
      tmap[key].deaths+=p._deaths||0;
      if(m.avgRank!=null){tmap[key].rankSum+=m.avgRank;tmap[key].rankCount++;}
      if(p._acs!=null){
        tmap[key].acsSum+=p._acs;tmap[key].acsCount++;
        // ACS rank among all players in the match (1 = highest)
        const ranked=m.players.filter(q=>q._acs!=null).sort((a,b)=>b._acs-a._acs);
        const place=ranked.findIndex(q=>q.puuid?q.puuid===p.puuid:`${q.name}#${q.tag}`===key);
        if(place!==-1){tmap[key].placeSum+=place+1;tmap[key].placeCount++;}
      }
    });
  });

  allTeammates=Object.values(tmap).sort((a,b)=>b.games-a.games);
  tmPage=0;

  if(!allTeammates.length){document.getElementById('teammates-section').style.display='none';return;}

  document.getElementById('teammates-section').style.display='block';
  renderTeammates();
}

function renderTeammates(){
  const list=document.getElementById('teammate-list');
  list.innerHTML='';
  const pages=Math.ceil(allTeammates.length/TM_PER_PAGE);
  const slice=allTeammates.slice(tmPage*TM_PER_PAGE,(tmPage+1)*TM_PER_PAGE);
  slice.forEach((t,i)=>{
    const globalRank=tmPage*TM_PER_PAGE+i+1;
    const kd=t.deaths>0?(t.kills/t.deaths).toFixed(2):t.kills.toFixed(2);
    const wr=Math.round(t.wins/t.games*100);
    const kdClass=parseFloat(kd)>1?'tm-kd-good':parseFloat(kd)<1?'tm-kd-bad':'tm-kd-mid';
    const avgRankRaw=t.rankCount>0?t.rankSum/t.rankCount:null;
    const avgRankTier=avgRankRaw!=null?Math.round(avgRankRaw):null;
    const row=document.createElement('div');
    row.className='teammate-card';
    const avgRankName=avgRankRaw!=null?avgLabel(avgRankRaw):'Unranked';
    row.innerHTML=`
      <div class="tm-row">
        <span class="tm-rank">#${globalRank}</span>
        <span class="tm-name">${t.name}</span>
        <span class="tm-tag">#${t.tag}</span>
        <span class="tm-meta">${t.games} games · <span class="tm-meta-wr" style="color:${wr>=50?'#22c55e':'#ef4444'}">${wr}%</span> WR</span>
      </div>
      <div class="tm-stats">
        <span class="tm-avg" title="${avgRankName}${avgRankRaw!=null?` (${avgRankRaw.toFixed(1)})`:''}">${avgRankTier!=null?rankIcon(avgRankTier,32):'<span class="tm-acs-val">—</span>'}</span>
        <div class="tm-kd"><span class="tm-kd-val ${kdClass}">${kd}</span><span class="tm-s-lbl">K/D</span></div>
        <div class="tm-acs"><span class="tm-acs-val">${t.acsCount>0?Math.round(t.acsSum/t.acsCount):'—'}</span><span class="tm-s-lbl">ACS</span></div>
      </div>
    `;

    list.appendChild(row);
  });

  // Pin the list height to its full-page size so the nav never moves up when
  // a page has fewer than TM_PER_PAGE rows. tmSectionH doubles as the list
  // height floor here — measured from the first full render in the rAF below.
  if(tmSectionH>0) list.style.minHeight=tmSectionH+'px';

  const dots=document.getElementById('tm-dots');
  syncDots(dots,pages>1?pages:0,tmPage,(i)=>goToTmPage(i));

  // Ratchet the list minHeight so switching to a shorter page never moves the
  // pagination nav up. Double-rAF ensures layout is fully settled before measuring.
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    tmSectionH=Math.max(tmSectionH,list.offsetHeight);
    list.style.minHeight=tmSectionH+'px';
  }));
}

function goToTmPage(idx){
  if(idx===tmPage)return;
  const list=document.getElementById('teammate-list');
  const dir=idx>tmPage?1:-1;
  tmPage=idx;
  list.style.overflow='hidden';
  list.style.transition='opacity .15s ease,transform .15s ease';
  list.style.opacity='0';
  list.style.transform=`translateX(${dir*-14}px)`;
  setTimeout(()=>{
    renderTeammates();
    list.style.transition='none';
    list.style.transform=`translateX(${dir*14}px)`;
    void list.offsetWidth; // force reflow so the next transition runs
    list.style.transition='opacity .22s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1)';
    list.style.opacity='1';
    list.style.transform='translateX(0)';
  },150);
}

/* ── PLAYTIME ────────────────────────────────────────────── */
function renderPlaytime(){
  const container=document.getElementById('playtime-container');
  container.innerHTML='';
  if(chartInstances.playtime){chartInstances.playtime.destroy();delete chartInstances.playtime;}

  const withDur=allMatches.filter(m=>m.startedAtMs!=null&&m.durationMs!=null&&m.durationMs>0);
  if(!withDur.length){document.getElementById('playtime-section').style.display='none';return;}

  // Pick a bucket size based on how much time the match history spans, so a
  // week of games shows daily bars while a full year rolls up into months.
  const minMs=Math.min(...withDur.map(m=>m.startedAtMs));
  const maxMs=Math.max(...withDur.map(m=>m.startedAtMs));
  const spanDays=(maxMs-minMs)/86400000;
  const granularity=spanDays<=14?'day':spanDays<=90?'week':'month';
  const granularityLabel=granularity==='day'?'Day':granularity==='week'?'Week':'Month';

  const buckets={};
  withDur.forEach(m=>{
    const d=new Date(m.startedAtMs);
    let sortVal,label;
    if(granularity==='day'){
      const start=new Date(d.getFullYear(),d.getMonth(),d.getDate());
      sortVal=start.getTime();
      label=start.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    }else if(granularity==='week'){
      const dow=d.getDay();
      const mondayOffset=(dow===0?-6:1)-dow;
      const monday=new Date(d.getFullYear(),d.getMonth(),d.getDate()+mondayOffset);
      sortVal=monday.getTime();
      label=monday.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    }else{
      const start=new Date(d.getFullYear(),d.getMonth(),1);
      sortVal=start.getTime();
      label=start.toLocaleDateString('en-GB',{month:'short',year:'2-digit'});
    }
    if(!buckets[sortVal])buckets[sortVal]={label,ms:0,count:0};
    buckets[sortVal].ms+=m.durationMs;
    buckets[sortVal].count++;
  });

  const sortedKeys=Object.keys(buckets).map(Number).sort((a,b)=>a-b);
  const labels=sortedKeys.map(k=>buckets[k].label);
  const hours=sortedKeys.map(k=>+(buckets[k].ms/3600000).toFixed(2));
  const counts=sortedKeys.map(k=>buckets[k].count);

  const totalMs=withDur.reduce((s,m)=>s+m.durationMs,0);
  const totalH=Math.floor(totalMs/3600000);
  const totalM=Math.round((totalMs%3600000)/60000);

  // Average hours per day since the act started (falls back to the match
  // history's own span if we couldn't resolve an act start date — e.g. "All
  // acts" is selected, or the lookup failed).
  const avgDayStartMs=actStartMs!=null&&actStartMs<=maxMs?actStartMs:minMs;
  const spanDaysInclusive=Math.max(1,Math.round((maxMs-avgDayStartMs)/86400000)+1);
  const avgHoursPerDay=(totalMs/3600000/spanDaysInclusive).toFixed(1);

  const card=document.createElement('div');
  card.className='chart-container';
  card.innerHTML=`
    <div class="card-title playtime-title">Playtime</div>
    <div class="playtime-head">
      <div class="playtime-total"><span class="playtime-total-val">${totalH}h ${totalM}m</span><span class="playtime-total-lbl">across ${withDur.length} match${withDur.length===1?'':'es'}</span></div>
      <div class="playtime-avgday"><span class="playtime-avgday-val">${avgHoursPerDay}h</span><span class="playtime-avgday-lbl">per day avg</span></div>
    </div>
    <div class="playtime-canvas-wrap"><canvas></canvas></div>
  `;
  container.appendChild(card);
  document.getElementById('playtime-section').style.display='block';

  const canvas=card.querySelector('canvas');
  const accentRgb=getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb').trim()||'59,130,246';
  // Darkened (but still fully opaque) version of the accent color for the
  // bottom of the bar gradient — using alpha-fade here instead would let
  // the y-axis grid lines show through wherever they cross a bar.
  const accentDarkRgb=accentRgb.split(',').map(n=>Math.round(parseFloat(n)*0.28)).join(',');
  function barFill(ctx,hover){
    const area=ctx.chart.chartArea;
    if(!area)return `rgba(${accentRgb},1)`;
    const g=ctx.chart.ctx.createLinearGradient(0,area.top,0,area.bottom);
    g.addColorStop(0,hover?`rgba(${accentRgb},1)`:`rgba(${accentRgb},.9)`);
    g.addColorStop(1,`rgba(${accentDarkRgb},1)`);
    return g;
  }

  chartInstances.playtime=new Chart(canvas,{
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'Hours Played',
        data:hours,
        backgroundColor:(ctx)=>barFill(ctx,false),
        hoverBackgroundColor:(ctx)=>barFill(ctx,true),
        borderColor:`rgba(${accentRgb},.9)`,
        borderWidth:1,
        borderRadius:5,
        borderSkipped:false,
        maxBarThickness:46,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{top:22,bottom:4}},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(10,10,12,.95)',
          borderColor:`rgba(${accentRgb},.4)`,
          borderWidth:1,
          padding:10,
          titleFont:{family:'Geist',size:11,weight:'700'},
          bodyFont:{family:'Geist',size:11},
          callbacks:{
            title:(items)=>`${granularityLabel} of ${items[0].label}`,
            label:(item)=>{
              const h=item.raw;
              const hh=Math.floor(h);
              const mm=Math.round((h-hh)*60);
              const c=counts[item.dataIndex];
              return[`${hh}h ${mm}m played`,`${c} match${c===1?'':'es'}`];
            }
          }
        }
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{color:'#6b7280',font:{family:'Geist',size:10},maxRotation:0,autoSkip:true,maxTicksLimit:7},
          border:{display:true,color:'rgba(255,255,255,.12)'}
        },
        y:{
          beginAtZero:true,
          grid:{color:'rgba(255,255,255,.05)',z:-1},
          ticks:{color:'#6b7280',font:{family:'Geist',size:10},callback:(v)=>v+'h'},
          border:{display:false}
        }
      }
    }
  });
}

/* ── K/D BY RANK (Player / Lobby toggle) ────────────────── */
let rankModeRows={player:[],lobby:[],party:[]};
let currentRankMode='player';

// Shared row-builder for both "by my rank" and "by avg lobby rank" views —
// they differ only in how each match is bucketed.
function buildKdRankRows(bucketFn){
  const rb={};
  allMatches.filter(m=>m.myStats).forEach(m=>{
    const info=bucketFn(m);
    if(!info)return;
    const t=info.tier;
    if(!rb[t])rb[t]={totalKills:0,totalDeaths:0,wins:0,total:0,label:info.label,icon:info.icon,acsSum:0,acsCount:0,placeSum:0,placeCount:0};
    rb[t].total++;
    if(m.won===true)rb[t].wins++;
    if(m.myStats.kills!=null)rb[t].totalKills+=m.myStats.kills;
    if(m.myStats.deaths!=null)rb[t].totalDeaths+=m.myStats.deaths;
    if(m.myStats.acs!=null){
      rb[t].acsSum+=m.myStats.acs;rb[t].acsCount++;
      const ranked=m.players.filter(p=>p._acs!=null).sort((a,b)=>b._acs-a._acs);
      const meIdx=ranked.findIndex(p=>PUUID?p.puuid===PUUID:`${p.name}#${p.tag}`.toLowerCase()===`${PLAYER}#${TAG}`.toLowerCase());
      if(meIdx!==-1){rb[t].placeSum+=meIdx+1;rb[t].placeCount++;}
    }
  });

  return Object.keys(rb).map(Number).sort((a,b)=>a-b).map(t=>{
    const b=rb[t];
    const kdRaw=b.totalDeaths>0?b.totalKills/b.totalDeaths:null;
    const kd=kdRaw!=null?kdRaw.toFixed(2):(b.totalKills>0?b.totalKills.toFixed(2):'—');
    const wr=Math.round(b.wins/b.total*100);
    const kdColor=kdRaw==null?'var(--muted)':kdRaw>1?'#22c55e':kdRaw<1?'#ef4444':'var(--text)';
    const wrColor=wr>=50?'#22c55e':'#ef4444';
    const avgAcsB=b.acsCount>0?Math.round(b.acsSum/b.acsCount):null;
    const avgPlaceB=b.placeCount>0?(b.placeSum/b.placeCount).toFixed(1):null;
    const icon=b.icon??rankIcon(t,28);
    const row=document.createElement('div');
    row.className='pb-row';
    row.innerHTML=`
      <div class="pb-row-head">
        <div class="pb-identity"><span class="pb-icon">${icon}</span><span class="pb-label">${b.label}</span></div>
        <span class="pb-matches">${b.total} match${b.total===1?'':'es'}</span>
      </div>
      <div class="pb-stats">
        <div class="pb-stat"><div class="pb-stat-lbl">K/D</div><div class="pb-stat-val" style="color:${kdColor}">${kd}</div></div>
        <div class="pb-stat"><div class="pb-stat-lbl">ACS</div><div class="pb-stat-val">${avgAcsB??'—'}</div></div>
        <div class="pb-stat"><div class="pb-stat-lbl">Avg Place</div><div class="pb-stat-val">${avgPlaceB??'—'}</div></div>
        <div class="pb-stat pb-stat-right"><div class="pb-stat-lbl">Win Ratio</div><div class="pb-stat-val" style="color:${wrColor}">${wr}%</div></div>
      </div>`;
    return row;
  });
}

const RANK_MODE_ORDER=['lobby','player','party'];

function renderRankByRankCard(){
  rankModeRows.player=buildKdRankRows(m=>{
    if(m.myTierId==null||m.myTierId<3)return null;
    return{tier:m.myTierId,label:m.myTierName};
  });
  rankModeRows.lobby=buildKdRankRows(m=>{
    if(m.avgRank==null)return null;
    const t=Math.round(m.avgRank);
    if(t<3)return null;
    return{tier:t,label:avgLabel(t)};
  });
  rankModeRows.party=buildKdRankRows(m=>{
    const sz=m.partySize||1;
    return{tier:sz,label:PARTY_LABELS[sz]||sz+'-Stack',icon:partyIcon(sz)};
  });

  // Party is only meaningful with 2+ distinct sizes represented — a single
  // bucket ("100% Solo") isn't a breakdown worth showing.
  const availability={
    player:rankModeRows.player.length>0,
    lobby:rankModeRows.lobby.length>0,
    party:rankModeRows.party.length>1,
  };
  const availableModes=RANK_MODE_ORDER.filter(m=>availability[m]);

  if(!availableModes.length){
    document.getElementById('sg-rank-card').style.display='none';
    return;
  }

  document.getElementById('sg-rank-card').style.display='block';
  document.getElementById('rank-mode-toggle').style.display=availableModes.length>1?'flex':'none';
  RANK_MODE_ORDER.forEach(m=>{
    document.getElementById('rmt-'+m).style.display=availability[m]?'':'none';
  });
  const defaultMode=availability.lobby?'lobby':availableModes[0];
  applyRankMode(defaultMode);
}

function applyRankMode(mode,animate){
  const prevMode=currentRankMode;
  currentRankMode=mode;
  RANK_MODE_ORDER.forEach(m=>{
    document.getElementById('rmt-'+m).classList.toggle('active',mode===m);
  });
  const ro=document.getElementById('sg-rank-overview');
  const dotsEl=document.getElementById('sg-rank-dots');

  if(!animate){
    paginateRows(ro,dotsEl,rankModeRows[mode]||[],4,false,matchRankRowHeights);
    ro.style.display='flex';
    ro.className='party-breakdown';
    matchRankRowHeights();
    return;
  }

  const dir=RANK_MODE_ORDER.indexOf(mode)>RANK_MODE_ORDER.indexOf(prevMode)?1:-1;
  const startH=ro.getBoundingClientRect().height;

  ro.style.overflow='hidden';
  ro.style.height=startH+'px';
  ro.style.minHeight='';
  ro.style.transition='opacity .15s ease,transform .15s ease';
  ro.style.opacity='0';
  ro.style.transform=`translateX(${dir*-14}px)`;
  setTimeout(()=>{
    // skipHeightLock=true — we're driving the height animation ourselves below,
    // so paginateRows' own minHeight bookkeeping would only fight with it.
    paginateRows(ro,dotsEl,rankModeRows[mode]||[],4,true,matchRankRowHeights);
    ro.style.display='flex';
    ro.className='party-breakdown';
    matchRankRowHeights();

    // Measure the new content's natural height, then snap back to the old
    // height so the transition below has a real start point to animate from.
    ro.style.height='';
    const endH=ro.offsetHeight;
    ro.style.height=startH+'px';
    ro.style.transition='none';
    ro.style.transform=`translateX(${dir*14}px)`;
    void ro.offsetWidth; // force reflow so the next transition runs
    ro.style.transition='opacity .22s cubic-bezier(.22,1,.36,1),transform .22s cubic-bezier(.22,1,.36,1),height .28s cubic-bezier(.22,1,.36,1)';
    ro.style.opacity='1';
    ro.style.transform='translateX(0)';
    ro.style.height=endH+'px';

    // Once the height settles, hand control back to plain minHeight so
    // clicking this mode's own page dots afterward behaves like every other
    // paginated list in the app.
    setTimeout(()=>{
      ro.style.transition='';
      ro.style.height='';
      ro.style.minHeight=endH+'px';
      ro.style.overflow='';
    },300);
  },150);
}

function setRankMode(mode){
  if(mode===currentRankMode)return;
  applyRankMode(mode,true);
}

function filtered(){
  let out=allMatches;
  if(activeFilter==='win')out=out.filter(m=>m.won===true);
  else if(activeFilter==='loss')out=out.filter(m=>m.won===false);
  if(activeRankFilter!=null){
    const RANK_GROUPS_FILTER={
      'Iron':[3,4,5],'Bronze':[6,7,8],'Silver':[9,10,11],'Gold':[12,13,14],
      'Plat':[15,16,17],'Diamond':[18,19,20],'Asc':[21,22,23],'Imm':[24,25,26],'Radiant':[27]
    };
    const tiers=RANK_GROUPS_FILTER[activeRankFilter]||[];
    out=out.filter(m=>m.avgRank!=null&&tiers.includes(Math.round(m.avgRank)));
  }
  if(activePartyFilter!=null)out=out.filter(m=>(m.partySize||1)===activePartyFilter);
  return out;
}

/* ── SHARED MATCH CARD BUILDER ───────────────────────────── */
function buildPlayersGrid(m){
  const me=m.players.find(p=>PUUID?p.puuid===PUUID:p.name?.toLowerCase()===PLAYER.toLowerCase()&&p.tag?.toLowerCase()===TAG.toLowerCase());
  const myTeamId=me?.team_id;
  const myPartyId=m.myPartyId;
  const {matchMvpPuuid,teamMvpPuuids}=m;

  // Sort by ACS desc (nulls last), fall back to tier
  const byAcs=(a,b)=>{
    if(a._acs!=null&&b._acs!=null)return b._acs-a._acs;
    if(a._acs!=null)return -1;
    if(b._acs!=null)return 1;
    return (b._tier??0)-(a._tier??0);
  };
  const myTeam=m.players.filter(p=>p.team_id===myTeamId).sort(byAcs);
  const enemyTeam=m.players.filter(p=>p.team_id!==myTeamId).sort(byAcs);

  function makeRow(p){
    const isMe=PUUID?p.puuid===PUUID:p.name?.toLowerCase()===PLAYER.toLowerCase()&&p.tag?.toLowerCase()===TAG.toLowerCase();
    const isParty=myPartyId&&p.party_id===myPartyId;
    const cls=['player-row',isMe?'is-me':'',isParty?'is-party':''].filter(Boolean).join(' ');
    const nameClass='player-name'+(isParty?' party-name':'');
    const isMatchMvp=matchMvpPuuid&&p.puuid===matchMvpPuuid;
    const isTeamMvp=!isMatchMvp&&teamMvpPuuids&&teamMvpPuuids.has(p.puuid);
    const mvpBadge=isMatchMvp
      ?`<span class="mvp-badge match-mvp">MVP</span>`
      :isTeamMvp?`<span class="mvp-badge team-mvp">TEAM</span>`:'';
    const acsVal=p._acs!=null?Math.round(p._acs):'—';
    const acsCls=p._acs!=null?'player-acs':'player-acs acs-null';
    return `<div class="${cls}"><span class="player-name-wrap"><span class="${nameClass}" title="${p.name}#${p.tag}">${p.name}</span><span class="player-tag">#${p.tag}</span>${mvpBadge}</span><span class="${acsCls}">${acsVal}</span><span class="player-rank-txt ${rClass(p._tier)}">${p._label}</span></div>`;
  }

  const grid=document.createElement('div');
  grid.className='players-grid';
  grid.innerHTML=`
    <div class="team-col">
      <div class="team-col-header">
        <span class="team-label">Your team</span>
        <span class="col-hdr col-hdr-acs">ACS</span>
        <span class="col-hdr col-hdr-rank">Rank</span>
      </div>
      ${myTeam.map(makeRow).join('')}
    </div>
    <div class="team-col">
      <div class="team-col-header">
        <span class="team-label">Enemy team</span>
        <span class="col-hdr col-hdr-acs">ACS</span>
        <span class="col-hdr col-hdr-rank">Rank</span>
      </div>
      ${enemyTeam.map(makeRow).join('')}
    </div>`;
  return grid;
}

function buildMatchCard(m){
  const {mapName,startedAt,won,myR,opR,avgRank,myStats,matchMvpPuuid,teamMvpPuuids}=m;
  const rc=won===true?'win':won===false?'loss':'draw';
  const rt=won===true?'Win':won===false?'Loss':'Draw';
  const score=(myR!=null&&opR!=null)?`${myR}–${opR}`:'—';
  const rankTier=avgRank!=null?Math.round(avgRank):null;
  const rankLabel=avgRank!=null?`${avgLabelShort(avgRank)} (${avgRank.toFixed(1)})`:'—';
  const rankColorClass=rankTier!=null?rClass(rankTier):'';

  const myPuuid=PUUID||null;
  const isMatchMvp=myPuuid&&matchMvpPuuid&&myPuuid===matchMvpPuuid;
  const isTeamMvp=!isMatchMvp&&myPuuid&&teamMvpPuuids&&teamMvpPuuids.has(myPuuid);
  const mvpTag=isMatchMvp
    ?`<span class="mvp-badge match-mvp">MVP</span>`
    :isTeamMvp?`<span class="mvp-badge team-mvp">TEAM</span>`:'';

  const statDefs=[
    {l:'ACS',k:'acs',   fmt:v=>v!=null?Math.round(v):'—'},
    {l:'K/D',k:'kd',fmt:v=>v?.toFixed(2)??'—'},
    {l:'K',  k:'kills',  fmt:v=>v??'—'},
    {l:'D',  k:'deaths', fmt:v=>v??'—'},
    {l:'A',  k:'assists',fmt:v=>v??'—'},
  ];

  const statsHtml=myStats
    ? statDefs.map(s=>{
        const v=s.fmt(myStats[s.k]);
        if(v==null)return '';
        return `<div class="mc-stat"><span class="mc-stat-lbl">${s.l}</span><span class="mc-stat-val">${v}</span></div>`;
      }).join('')
    : '';

  const card=document.createElement('div');
  card.className='match-card';
  card.innerHTML=`
    <div class="match-row">
      <div class="result-bar ${rc}"></div>
      <div class="mc-left">
        <span class="m-result-tag ${rc}">${rt}</span>
        <span class="match-map">${mapName}</span>
        <span class="match-score">${score}</span>
        ${mvpTag}
      </div>
      <div class="mc-right">
        <div class="m-badge">
          <div class="m-badge-lbl">avg lobby</div>
          <div class="m-badge-val ${rankColorClass}">${rankLabel}</div>
        </div>
        <span class="match-date">${startedAt}</span>
      </div>
    </div>
    ${statsHtml?`<div class="mc-stats-row">${statsHtml}</div>`:''}`;
  card.addEventListener('click',()=>{
    if(window.getSelection()&&window.getSelection().toString().length>0)return;
    card.classList.toggle('expanded');
  });
  return card;
}





function dayHeaderLabel(ms){
  if(ms==null)return 'Unknown date';
  return new Date(ms).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function buildMatchRows(slice,startDayKey){
  const frag=document.createDocumentFragment();
  let lastDayKey=startDayKey;
  slice.forEach(m=>{
    const dayKey=m.startedAtMs!=null?new Date(m.startedAtMs).toDateString():'unknown';
    if(dayKey!==lastDayKey){
      const header=document.createElement('div');
      header.className='match-day-header';
      header.textContent=dayHeaderLabel(m.startedAtMs);
      frag.appendChild(header);
      lastDayKey=dayKey;
    }
    const card=buildMatchCard(m);
    card.appendChild(buildPlayersGrid(m));
    frag.appendChild(card);
  });
  return{frag,lastDayKey};
}

function updateLoadMoreBtn(total){
  const loadMoreBtn=document.getElementById('load-more-btn');
  const remaining=Math.max(0,total-mhVisible);
  if(remaining>0){
    loadMoreBtn.style.display='block';
    loadMoreBtn.textContent=`Load More (${remaining} remaining)`;
  }else{
    loadMoreBtn.style.display='none';
  }
}

// Full rebuild — used for the initial render and whenever filters change, since
// the underlying filtered/sorted set is different and everything needs redoing.
function renderMatches(){
  mhData=filtered().slice().sort((a,b)=>(b.startedAtMs??0)-(a.startedAtMs??0));
  const slice=mhData.slice(0,mhVisible);
  const el=document.getElementById('matches-container');
  el.innerHTML='';
  if(!slice.length){
    el.innerHTML='<div class="empty">No matches.</div>';
    mhLastDayKey=null;
    document.getElementById('load-more-btn').style.display='none';
    return;
  }

  const list=document.createElement('div');list.className='matches';
  const{frag,lastDayKey}=buildMatchRows(slice,null);
  list.appendChild(frag);
  el.appendChild(list);
  mhLastDayKey=lastDayKey;

  updateLoadMoreBtn(mhData.length);
}

function toggleHistory(){
  const section=document.getElementById('match-list-section');
  const btn=document.getElementById('show-history-btn');
  const visible=section.style.display!=='none';
  section.style.display=visible?'none':'block';
  btn.textContent=visible?'Show Match History':'Hide Match History';
  if(!visible)renderMatches();
}

// Incremental append — only builds the newly revealed batch and appends it,
// leaving already-rendered cards untouched so each click stays cheap regardless
// of how much has already been loaded.
function loadMoreMatches(){
  const prevVisible=mhVisible;
  if(prevVisible>=mhData.length)return;
  mhVisible+=PER_PAGE;
  const newSlice=mhData.slice(prevVisible,mhVisible);
  if(!newSlice.length)return;
  const list=document.querySelector('#matches-container .matches');
  if(!list)return;
  const{frag,lastDayKey}=buildMatchRows(newSlice,mhLastDayKey);
  list.appendChild(frag);
  mhLastDayKey=lastDayKey;

  updateLoadMoreBtn(mhData.length);
}
</script>
