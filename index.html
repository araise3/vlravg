// Open/close the filter dropdown; positions the panel to the LEFT of the trigger
// (beside the matches) and closes on outside click.
function toggleFilterPanel(e){
  e?.stopPropagation();
  const dd=document.getElementById('filter-dd');
  const panel=document.getElementById('filter-panel');
  const open=!dd.classList.contains('open');
  dd.classList.toggle('open',open);
  panel.classList.toggle('open',open);
  document.getElementById('filter-trigger').setAttribute('aria-expanded',open?'true':'false');
  if(open){
    positionFilterPanel();
    document.addEventListener('click',_filterOutsideClick,true);
    window.addEventListener('scroll',positionFilterPanel,true);
    window.addEventListener('resize',positionFilterPanel);
  }else{
    document.removeEventListener('click',_filterOutsideClick,true);
    window.removeEventListener('scroll',positionFilterPanel,true);
    window.removeEventListener('resize',positionFilterPanel);
  }
}
// Place the panel to the LEFT of the trigger, in the gutter beside the match
// list. Falls back to dropping below the trigger when there isn't room on the
// left (e.g. narrow viewports), and clamps vertically to stay on screen.
function positionFilterPanel(){
  const dd=document.getElementById('filter-dd');
  const panel=document.getElementById('filter-panel');
  if(!dd.classList.contains('open'))return;
  const trigger=document.getElementById('filter-trigger');
  const r=trigger.getBoundingClientRect();
  const pw=panel.offsetWidth||220, ph=panel.offsetHeight||260, gap=8;
  let left=r.left-pw-gap;      // to the left of the trigger
  let top=r.top;               // aligned with the trigger's top
  if(left<6){                  // not enough room on the left → drop below instead
    left=Math.min(r.left,window.innerWidth-pw-6);
    top=r.bottom+6;
  }
  top=Math.max(6,Math.min(top,window.innerHeight-ph-6)); // keep on screen
  panel.style.left=left+'px';
  panel.style.top=top+'px';
}
function _filterOutsideClick(ev){
  const dd=document.getElementById('filter-dd');
  const panel=document.getElementById('filter-panel');
  if(dd&&!dd.contains(ev.target)&&!panel.contains(ev.target)){
    dd.classList.remove('open');
    panel.classList.remove('open');
    document.getElementById('filter-trigger').setAttribute('aria-expanded','false');
    document.removeEventListener('click',_filterOutsideClick,true);
    window.removeEventListener('scroll',positionFilterPanel,true);
    window.removeEventListener('resize',positionFilterPanel);
  }
}

// Rank group → tier ids, used to translate ticked rank-filter labels into the
// set of avg-lobby tiers to keep. Module-level constant (was previously rebuilt
// inside filtered() on every filter change).
const RANK_GROUPS_FILTER={
  'Iron':[3,4,5],'Bronze':[6,7,8],'Silver':[9,10,11],'Gold':[12,13,14],
  'Platinum':[15,16,17],'Diamond':[18,19,20],'Ascendant':[21,22,23],'Immortal':[24,25,26],'Radiant':[27]
};
function filtered(){
  let out=allMatches;
  // Result: empty set = show all; otherwise keep matches whose outcome is ticked.
  if(resultFilters.size)out=out.filter(m=>resultFilters.has(m.won===true?'win':m.won===false?'loss':'draw'));
  // Rank: empty = all; otherwise match is kept if its rank group is ticked (OR).
  if(rankFilters.size){
    const tiers=new Set([...rankFilters].flatMap(l=>RANK_GROUPS_FILTER[l]||[]));
    out=out.filter(m=>m.avgRank!=null&&tiers.has(Math.round(m.avgRank)));
  }
  // Party: empty = all; otherwise keep matches whose party size is ticked (OR).
  if(partyFilters.size)out=out.filter(m=>partyFilters.has(m.partySize||1));
  // Map: empty = all; otherwise keep matches on any ticked map (OR).
  if(mapFilters.size)out=out.filter(m=>mapFilters.has(m.mapName));
  return out;
}

/* ── SHARED MATCH CARD BUILDER ───────────────────────────── */
/* ── CLUTCH DEBUG PANEL ──────────────────────────────────────────────────
   TEMP DEBUG — a manual-labeling tool for calibrating the clutch-outcome
   logic (see processMatch) against real matches. For every round where the
   searched player had a genuine clutch situation, shows what the algorithm
   computed and lets you override it with the correct outcome. "Download"
   exports the full raw match JSON (pulled from window.__rawMatches, the same
   stash used for finding matches to send back) with both the computed and
   your assigned outcome attached per round, ready to hand back for fixing
   the logic. Remove this whole block once no longer needed. */
function buildClutchDebugPanel(m){
  const rounds=m.myClutchRounds||[];
  if(!rounds.length||!m.matchId)return null;

  window.__clutchOverrides=window.__clutchOverrides||{};
  const matchOverrides=(window.__clutchOverrides[m.matchId]=window.__clutchOverrides[m.matchId]||{});

  const OUTCOMES=['win','loss','exit','save'];
  const OUTCOME_LABELS={win:'Win',loss:'Loss',exit:'Exit',save:'Save'};

  const wrap=document.createElement('div');
  wrap.className='clutch-debug';

  const toggle=document.createElement('button');
  toggle.type='button';
  toggle.className='clutch-debug-toggle';
  toggle.textContent=`🐛 Clutch debug (${rounds.length})`;

  const panel=document.createElement('div');
  panel.className='clutch-debug-panel';
  panel.style.display='none';

  function renderRows(){
    panel.innerHTML='';
    rounds.forEach(rd=>{
      const assigned=matchOverrides[rd.round]??rd.outcome;
      const row=document.createElement('div');
      row.className='clutch-debug-row';
      const lbl=document.createElement('span');
      lbl.className='clutch-debug-round-lbl';
      lbl.textContent=`Round ${rd.round+1} · 1v${rd.type}`;
      const btnGroup=document.createElement('div');
      btnGroup.className='clutch-debug-btns';
      OUTCOMES.forEach(o=>{
        const b=document.createElement('button');
        b.type='button';
        b.className=`clutch-debug-btn seg-${o}`+(assigned===o?' active':'');
        b.textContent=OUTCOME_LABELS[o];
        b.addEventListener('click',(e)=>{
          e.stopPropagation();
          matchOverrides[rd.round]=o;
          renderRows();
        });
        btnGroup.appendChild(b);
      });
      row.appendChild(lbl);
      row.appendChild(btnGroup);
      panel.appendChild(row);
    });
    const hint=document.createElement('div');
    hint.className='clutch-debug-hint';
    hint.textContent='Highlighted = currently assigned (computed by default; click a button to correct it).';
    panel.appendChild(hint);
    const dl=document.createElement('button');
    dl.type='button';
    dl.className='clutch-debug-download';
    dl.textContent='⬇ Download match JSON with assigned outcomes';
    dl.addEventListener('click',(e)=>{e.stopPropagation();downloadClutchLabels(m,rounds,matchOverrides);});
    panel.appendChild(dl);
  }
  renderRows();

  toggle.addEventListener('click',(e)=>{
    e.stopPropagation();
    panel.style.display=panel.style.display==='none'?'flex':'none';
  });

  wrap.appendChild(toggle);
  wrap.appendChild(panel);
  return wrap;
}

function downloadClutchLabels(m,rounds,overrides){
  const raw=(window.__rawMatches||[]).find(rm=>(rm.metadata?.match_id||rm.match_id)===m.matchId);
  if(!raw){
    alert('Raw match data not found in this session — the match may have loaded before this debug tool was added, or the page was reloaded since. Search again and try this match fresh.');
    return;
  }
  const labels=rounds.map(rd=>({
    round:rd.round,
    type:rd.type,
    computedOutcome:rd.outcome,
    assignedOutcome:overrides[rd.round]??rd.outcome,
  }));
  const payload={
    ...raw,
    __clutchLabels:{puuid:PUUID,player:`${PLAYER}#${TAG}`,labels}
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`match_${m.matchId}_clutch_labels.json`;
  a.click();
}

function buildPlayersGrid(m){
  const me=m.players.find(p=>PUUID?p.puuid===PUUID:p.name?.toLowerCase()===PLAYER.toLowerCase()&&p.tag?.toLowerCase()===TAG.toLowerCase());
  const myTeamId=me?.team_id;
  const myPartyId=m.myPartyId;
  const {matchMvpPuuid,teamMvpPuuids}=m;

  // Sort by ACS desc (nulls last), fall back to tier
  const byAcs=(a,b)=>{
    if(a._acs!=null&&b._acs!=null)return b._acs-a._acs;
    if(a._acs!=null)return -1;
    if(b._acs!=null)return 1;
    return (b._tier??0)-(a._tier??0);
  };
  const myTeam=m.players.filter(p=>p.team_id===myTeamId).sort(byAcs);
  const enemyTeam=m.players.filter(p=>p.team_id!==myTeamId).sort(byAcs);

  function makeRow(p){
    const isMe=p===me;
    const isParty=myPartyId&&p.party_id===myPartyId;
    const cls=['player-row',isMe?'is-me':'',isParty?'is-party':''].filter(Boolean).join(' ');
    const nameClass='player-name'+(isParty?' party-name':'');
    const isMatchMvp=matchMvpPuuid&&p.puuid===matchMvpPuuid;
    const isTeamMvp=!isMatchMvp&&teamMvpPuuids&&teamMvpPuuids.has(p.puuid);
    const mvpBadge=isMatchMvp
      ?`<span class="mvp-badge match-mvp">MVP</span>`
      :isTeamMvp?`<span class="mvp-badge team-mvp">TEAM</span>`:'';
    const acsVal=p._acs!=null?Math.round(p._acs):'—';
    const acsCls=p._acs!=null?'player-acs':'player-acs acs-null';
    const kdVal=p._kd!=null?p._kd.toFixed(2):'—';
    const kdCls=p._kd!=null?'player-kd':'player-kd kd-null';
    // Total exit-classified clutches (across all 1v1-1v5 types) this match —
    // see processMatch's clutch-detection block for what counts as an exit.
    const exitCount=p._clutchAll?Object.values(p._clutchAll).reduce((a,t)=>a+t.exit,0):0;
    const hasClutches=p._clutchAll!=null;
    const exitVal=hasClutches?String(exitCount):'—';
    const exitCls='player-1v2'+(!hasClutches?' p1v2-null':exitCount>0?' p1v2-exit':'');
    return `<div class="${cls}"><span class="player-name-wrap"><span class="${nameClass}" title="${p.name}#${p.tag}">${p.name}</span><span class="player-tag">#${p.tag}</span>${mvpBadge}</span><span class="${acsCls}">${acsVal}</span><span class="${kdCls}">${kdVal}</span><span class="${exitCls}" title="Clutch situations this match classified as an exit — got a kill but wasn't genuinely attempting to win the round">${exitVal}</span><span class="player-rank-txt ${rClass(p._tier)}">${p._label}</span></div>`;
  }

  const grid=document.createElement('div');
  grid.className='players-grid';
  grid.innerHTML=`
    <div class="team-col">
      <div class="team-col-header">
        <span class="team-label">Your team</span>
        <span class="col-hdr col-hdr-acs">ACS</span>
        <span class="col-hdr col-hdr-kd">KD</span>
        <span class="col-hdr col-hdr-1v2">EXIT</span>
        <span class="col-hdr col-hdr-rank">Rank</span>
      </div>
      ${myTeam.map(makeRow).join('')}
    </div>
    <div class="team-col">
      <div class="team-col-header">
        <span class="team-label">Enemy team</span>
        <span class="col-hdr col-hdr-acs">ACS</span>
        <span class="col-hdr col-hdr-kd">KD</span>
        <span class="col-hdr col-hdr-1v2">EXIT</span>
        <span class="col-hdr col-hdr-rank">Rank</span>
      </div>
      ${enemyTeam.map(makeRow).join('')}
    </div>`;
  return grid;
}

function buildMatchCard(m){
  const {mapName,startedAt,won,myR,opR,avgRank,myStats,matchMvpPuuid,teamMvpPuuids}=m;
  const rc=won===true?'win':won===false?'loss':'draw';
  const rt=won===true?'Win':won===false?'Loss':'Draw';
  const score=(myR!=null&&opR!=null)?`${myR}–${opR}`:'—';
  // Show the avg-lobby tier as a rank division + RR (see tierRR).
  let rankTier=null,rankRR=null;
  if(avgRank!=null){const _t=tierRR(avgRank);rankTier=_t.tier;rankRR=_t.rr;}
  const rankLabel=avgRank!=null?`${avgLabelShort(rankTier)} (${rankRR} RR)`:(m.lowRated?'unrated lobby':'—');
  const rankTitle=m.lowRated
    ? `Only ${m.ratedCount} of the lobby were rated — too many unranked, excluded from stats`
    : (avgRank!=null?`Avg lobby rank — ${avgLabel(rankTier)}, ${rankRR} RR`:'');
  const rankColorClass=rankTier!=null?rClass(rankTier):'';

  const myPuuid=PUUID||null;
  const isMatchMvp=myPuuid&&matchMvpPuuid&&myPuuid===matchMvpPuuid;
  const isTeamMvp=!isMatchMvp&&myPuuid&&teamMvpPuuids&&teamMvpPuuids.has(myPuuid);
  const mvpTag=isMatchMvp
    ?`<span class="mvp-badge match-mvp">MVP</span>`
    :isTeamMvp?`<span class="mvp-badge team-mvp">TEAM</span>`:'';

  const resetTag=m.postReset?`<span class="mc-reset-tag" title="Placement-week game after a total rank reset — excluded from stats unless you toggle it on">PLACEMENTS</span>`:'';

  const card=document.createElement('div');
  card.className='match-card'+(m.postReset?' post-reset':'');
  card.innerHTML=`
    <div class="match-row">
      <div class="result-bar ${rc}"></div>
      <div class="mc-left">
        <span class="m-result-tag ${rc}">${rt}</span>
        <span class="match-map">${mapName}</span>
        <span class="match-score">${score}</span>
        ${mvpTag}
        ${resetTag}
      </div>
      <div class="mc-right">
        <div class="m-badge"${rankTitle?` title="${rankTitle}"`:''}>
          <div class="m-badge-lbl">avg lobby</div>
          <div class="m-badge-val ${rankColorClass}${m.lowRated?' m-badge-settling':''}">${rankLabel}</div>
        </div>
        <span class="match-date">${startedAt}</span>
      </div>
    </div>`;
  card.addEventListener('click',()=>{
    if(window.getSelection()&&window.getSelection().toString().length>0)return;
    card.classList.toggle('expanded');
  });
  return card;
}





function dayHeaderLabel(ms){
  if(ms==null)return 'Unknown date';
  return new Date(ms).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function buildMatchRows(slice,startDayKey){
  const frag=document.createDocumentFragment();
  let lastDayKey=startDayKey;
  slice.forEach(m=>{
    const dayKey=m.startedAtMs!=null?new Date(m.startedAtMs).toDateString():'unknown';
    if(dayKey!==lastDayKey){
      const header=document.createElement('div');
      header.className='match-day-header';
      const stat=mhDayStats[dayKey];
      let avgHtml='';
      if(stat&&stat.count>0){
        const dayAvg=stat.sum/stat.count;
        const{tier,rr}=tierRR(dayAvg);
        avgHtml=`<span class="match-day-avg">avg lobby <span class="${rClass(tier)}">${avgLabelShort(tier)} (${rr} RR)</span></span>`;
      }
      header.innerHTML=`<span>${dayHeaderLabel(m.startedAtMs)}</span>${avgHtml}`;
      frag.appendChild(header);
      lastDayKey=dayKey;
    }
    const card=buildMatchCard(m);
    card.appendChild(buildPlayersGrid(m));
    const debugPanel=buildClutchDebugPanel(m);
    if(debugPanel)card.appendChild(debugPanel);
    frag.appendChild(card);
  });
  return{frag,lastDayKey};
}

function updateLoadMoreBtn(total){
  const loadMoreBtn=document.getElementById('load-more-btn');
  const remaining=Math.max(0,total-mhVisible);
  if(remaining>0){
    loadMoreBtn.style.display='block';
    loadMoreBtn.textContent=`Load More (${remaining} remaining)`;
  }else{
    loadMoreBtn.style.display='none';
  }
}

// Full rebuild — used for the initial render and whenever filters change, since
// the underlying filtered/sorted set is different and everything needs redoing.
function renderMatches(){
  mhData=filtered().slice().sort((a,b)=>(b.startedAtMs??0)-(a.startedAtMs??0));
  // Per-day avg lobby rank, aggregated across the FULL filtered set (mhData) —
  // not just whatever page is currently visible — so a day's figure in the
  // header stays correct and stable regardless of Load More/pagination, and
  // respects active filters the same way the match cards themselves do.
  mhDayStats={};
  mhData.forEach(m=>{
    if(m.startedAtMs==null||m.avgRank==null)return;
    const k=new Date(m.startedAtMs).toDateString();
    if(!mhDayStats[k])mhDayStats[k]={sum:0,count:0};
    mhDayStats[k].sum+=m.avgRank;
    mhDayStats[k].count++;
  });
  const slice=mhData.slice(0,mhVisible);
  const el=document.getElementById('matches-container');
  el.innerHTML='';
  if(!slice.length){
    el.innerHTML='<div class="empty">No matches.</div>';
    mhLastDayKey=null;
    document.getElementById('load-more-btn').style.display='none';
    return;
  }

  const list=document.createElement('div');list.className='matches';
  const{frag,lastDayKey}=buildMatchRows(slice,null);
  list.appendChild(frag);
  el.appendChild(list);
  mhLastDayKey=lastDayKey;

  updateLoadMoreBtn(mhData.length);
}

function toggleHistory(){
  const section=document.getElementById('match-list-section');
  const btn=document.getElementById('show-history-btn');
  const visible=section.style.display!=='none';
  section.style.display=visible?'none':'block';
  btn.textContent=visible?'Show Match History':'Hide Match History';
  if(!visible)renderMatches();
}

// Incremental append — only builds the newly revealed batch and appends it,
// leaving already-rendered cards untouched so each click stays cheap regardless
// of how much has already been loaded.
function loadMoreMatches(){
  const prevVisible=mhVisible;
  if(prevVisible>=mhData.length)return;
  mhVisible+=PER_PAGE;
  const newSlice=mhData.slice(prevVisible,mhVisible);
  if(!newSlice.length)return;
  const list=document.querySelector('#matches-container .matches');
  if(!list)return;
  const{frag,lastDayKey}=buildMatchRows(newSlice,mhLastDayKey);
  list.appendChild(frag);
  mhLastDayKey=lastDayKey;

  updateLoadMoreBtn(mhData.length);
}
</script>
